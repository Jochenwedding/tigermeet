<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Tiger Karaoke Araxos</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#020202;
  color:white;
  font-family:Arial,Helvetica,sans-serif;
}

body{
  background:
    radial-gradient(circle at top,rgba(255,136,0,.35),transparent 42%),
    linear-gradient(145deg,#030303,#111,#000);
}

#enterScreen{
  position:fixed;
  inset:0;
  z-index:50;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  overflow:hidden;
  background:
    linear-gradient(rgba(0,0,0,.65),rgba(0,0,0,.84)),
    repeating-linear-gradient(45deg,#ff8800 0,#ff8800 22px,#000 22px,#000 44px);
}

#loginVideo{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:0;
  opacity:.7;
  display:none;
}

.loginOverlay{
  position:absolute;
  inset:0;
  z-index:1;
  background:
    radial-gradient(circle at center,rgba(0,0,0,.05),rgba(0,0,0,.72)),
    linear-gradient(rgba(0,0,0,.16),rgba(0,0,0,.62));
}

.enterContent{
  position:relative;
  z-index:5;
  padding:22px;
}

.logo{
  font-size:clamp(38px,8vw,82px);
  font-weight:1000;
  color:#ff9d00;
  text-shadow:0 0 22px orange,0 0 45px #ff5500;
  letter-spacing:2px;
}

.sub{
  color:#eee;
  font-size:18px;
  margin:14px 0 30px;
  text-shadow:0 0 8px #000;
}

.enterBtn{
  background:linear-gradient(180deg,#ffb000,#ff7700);
  color:#000;
  border:none;
  padding:19px 36px;
  border-radius:18px;
  font-size:23px;
  font-weight:1000;
  box-shadow:0 0 35px rgba(255,136,0,.85);
  cursor:pointer;
}

.enterBtn:active{transform:scale(.96)}

.creatorEnter{
  margin-top:18px;
  font-size:13px;
  letter-spacing:2px;
  color:#ddd;
  text-shadow:0 0 8px #000;
}

/* JET INTRO */

#jet{
  position:fixed;
  left:-55vw;
  top:42%;
  z-index:90;
  width:min(560px,78vw);
  display:none;
  filter:
    drop-shadow(0 0 20px orange)
    drop-shadow(0 0 55px #ff4d00);
}

#jet.fly{
  display:block;
  animation:flyby 3.1s cubic-bezier(.08,.9,.18,1) forwards;
}

.afterburner{
  position:absolute;
  left:-170px;
  top:50%;
  width:230px;
  height:44px;
  transform:translateY(-50%);
  border-radius:50%;
  background:linear-gradient(90deg,rgba(255,60,0,0),rgba(255,136,0,.95),rgba(255,255,255,.95));
  filter:blur(5px);
  animation:burn .09s infinite alternate;
}

#jet img{
  width:100%;
  display:block;
  transform:rotate(5deg);
}

@keyframes burn{
  from{transform:translateY(-50%) scaleX(.8);opacity:.7}
  to{transform:translateY(-50%) scaleX(1.25);opacity:1}
}

@keyframes flyby{
  0%{left:-60vw;top:56%;transform:scale(.65) rotate(2deg)}
  35%{left:24%;top:37%;transform:scale(1.45) rotate(0deg)}
  58%{left:48%;top:31%;transform:scale(1.85) rotate(-2deg)}
  100%{left:125%;top:12%;transform:scale(.85) rotate(-8deg)}
}

.shake{animation:shake .55s}
@keyframes shake{
  0%,100%{transform:translate(0,0)}
  20%{transform:translate(-13px,7px)}
  40%{transform:translate(10px,-7px)}
  60%{transform:translate(-8px,-5px)}
  80%{transform:translate(7px,7px)}
}

/* KARAOKE SCREEN */

#karaokeScreen{
  position:fixed;
  inset:0;
  display:none;
  background:
    radial-gradient(circle at center,rgba(255,136,0,.18),transparent 48%),
    linear-gradient(145deg,#080808,#171717,#000);
}

.videoFrame{
  position:absolute;
  top:50%;
  left:50%;
  width:min(58vw,860px);
  aspect-ratio:16/9;
  transform:translate(-50%,-50%);
  z-index:0;
  border-radius:30px;
  overflow:hidden;
  background:#000;
  box-shadow:
    0 0 40px rgba(255,136,0,.62),
    0 0 110px rgba(255,80,0,.32);
  opacity:.92;
}

#bgVideo{
  width:100%;
  height:100%;
  object-fit:contain;
  background:#000;
}

.overlay{
  position:absolute;
  inset:0;
  z-index:1;
  background:
    radial-gradient(circle at center,rgba(0,0,0,.02),rgba(0,0,0,.58) 78%),
    linear-gradient(rgba(0,0,0,.08),rgba(0,0,0,.45));
  pointer-events:none;
}

.header{
  position:absolute;
  top:12px;
  left:12px;
  right:12px;
  z-index:5;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}

.titleBlock{
  display:flex;
  flex-direction:column;
  gap:3px;
}

.title{
  font-size:20px;
  font-weight:1000;
  color:#ff9d00;
  text-shadow:0 0 15px #000;
}

.creator{
  font-size:12px;
  color:#ddd;
  letter-spacing:2px;
  text-transform:uppercase;
}

.controls{
  display:flex;
  gap:7px;
  flex-wrap:wrap;
  justify-content:flex-end;
}

.controls button,
.controls a{
  text-decoration:none;
  border:none;
  background:rgba(255,136,0,.94);
  color:#000;
  font-weight:1000;
  border-radius:12px;
  padding:10px 13px;
  cursor:pointer;
  font-size:13px;
  box-shadow:0 0 15px rgba(0,0,0,.4);
}

.controls button.active{
  background:#fff;
  box-shadow:0 0 15px orange;
}

#lyricsViewport{
  position:absolute;
  inset:92px 0 58px 0;
  z-index:4;
  overflow:hidden;
  text-align:center;
  pointer-events:none;
}

#lyricsTrack{
  position:absolute;
  top:50%;
  left:0;
  right:0;
  transform:translateY(0);
  transition:transform 1.15s cubic-bezier(.22,.75,.22,1);
  will-change:transform;
}

.line{
  font-size:clamp(29px,6.4vw,76px);
  line-height:1.08;
  font-weight:1000;
  letter-spacing:1px;
  text-transform:uppercase;
  opacity:.38;
  margin:32px auto;
  max-width:1200px;
  color:white;
  text-shadow:
    0 0 8px rgba(0,0,0,.95),
    0 0 18px rgba(0,0,0,.95),
    4px 4px 0 #000;
  transition:opacity .45s, color .45s, transform .45s, text-shadow .45s;
}

.line.active{
  opacity:1;
  color:#ffae00;
  transform:scale(1.08);
  animation:karaokeGlow 1.2s ease-in-out infinite alternate;
}

.line.passed{
  opacity:.3;
}

@keyframes karaokeGlow{
  from{
    text-shadow:
      0 0 8px rgba(0,0,0,.95),
      0 0 14px orange,
      4px 4px 0 #000;
  }

  to{
    text-shadow:
      0 0 10px rgba(0,0,0,.98),
      0 0 24px #ff9900,
      0 0 38px rgba(255,140,0,.7),
      4px 4px 0 #000;
  }
}

.status{
  position:absolute;
  bottom:10px;
  left:12px;
  right:12px;
  z-index:6;
  font-size:13px;
  color:#eee;
  opacity:.95;
  text-shadow:0 0 8px #000;
  display:flex;
  justify-content:space-between;
  gap:10px;
}

.watermark{
  position:absolute;
  right:16px;
  bottom:34px;
  z-index:6;
  font-size:12px;
  letter-spacing:3px;
  color:rgba(255,255,255,.65);
  text-shadow:0 0 10px #000;
}

#audio,#jetSound{display:none}

@media(max-width:700px){
  .videoFrame{
    width:88vw;
  }

  .header{
    flex-direction:column;
    align-items:flex-start;
  }

  #lyricsViewport{
    inset:150px 0 58px 0;
  }

  .controls{
    justify-content:flex-start;
  }

  #jet{
    width:92vw;
  }

  .watermark{
    bottom:55px;
  }
}
</style>
</head>

<body>

<div id="enterScreen">
  <video id="loginVideo" src="login.mp4" autoplay muted loop playsinline></video>
  <div class="loginOverlay"></div>

  <div class="enterContent">
    <div class="logo">TIGER KARAOKE</div>
    <div class="sub">Tigermeet Araxos - V7.73<br>Jo Chen Edition</div>
    <button class="enterBtn" onclick="enterKaraoke()">ENTER ARAXOS BABY</button>
    <div class="creatorEnter">Created by Jochen M</div>
  </div>
</div>

<div id="jet">
  <div class="afterburner"></div>
  <img src="jet.png" alt="Jet">
</div>

<div id="karaokeScreen">
  <div class="videoFrame">
    <video id="bgVideo" src="simone.mp4" muted loop playsinline></video>
  </div>

  <div class="overlay"></div>

  <div class="header">
    <div class="titleBlock">
      <div class="title">TIGERMEET ARAXOS — KARAOKE MODE</div>
      <div class="creator">Jochen M embedded edition</div>
    </div>

    <div class="controls">
      <a href="/tigergames/">TIGERGAMES</a>
      <button onclick="playSong()">PLAY</button>
      <button onclick="pauseSong()">PAUSE</button>
      <button onclick="stopSong()">STOP</button>
      <button id="repeatBtn" onclick="toggleRepeat()">REPEAT OFF</button>
    </div>
  </div>

  <div id="lyricsViewport">
    <div id="lyricsTrack"></div>
  </div>

  <audio id="audio" preload="auto" src="Araxos Baby .mp3"></audio>
  <audio id="jetSound" preload="auto" src="jet.mp3"></audio>

  <div class="watermark">JOCHEN M</div>

  <div class="status">
    <span id="statusLeft">Loading...</span>
    <span id="statusRight">Tiger mode standby</span>
  </div>
</div>

<script>
const enterScreen = document.getElementById("enterScreen");
const karaokeScreen = document.getElementById("karaokeScreen");
const jet = document.getElementById("jet");
const audio = document.getElementById("audio");
const jetSound = document.getElementById("jetSound");
const bgVideo = document.getElementById("bgVideo");
const loginVideo = document.getElementById("loginVideo");
const lyricsTrack = document.getElementById("lyricsTrack");
const statusLeft = document.getElementById("statusLeft");
const statusRight = document.getElementById("statusRight");
const repeatBtn = document.getElementById("repeatBtn");

const SONG_DELAY_MS = 4000;
const LYRIC_OFFSET_SECONDS = 0.15;

let lyrics = [];
let repeat = false;
let lastActiveIndex = -1;

loginVideo.addEventListener("loadeddata", () => {
  loginVideo.style.display = "block";
});

loginVideo.addEventListener("error", () => {
  loginVideo.style.display = "none";
});

async function loadLRC(){
  try{
    const res = await fetch("Araxos Baby.lrc?cache=" + Date.now());

    if(!res.ok){
      throw new Error("Araxos Baby.lrc not found");
    }

    const text = await res.text();
    lyrics = [];

    text.split(/\r?\n/).forEach(line => {
      const matches = [...line.matchAll(/\[(\d{1,2}):(\d{2})(?:[.:](\d{1,3}))?\]/g)];
      const cleanText = line.replace(/\[[^\]]+\]/g,"").trim();

      if(!matches.length || !cleanText) return;

      matches.forEach(m => {
        const min = parseInt(m[1],10);
        const sec = parseInt(m[2],10);
        const ms = m[3] ? parseFloat("0." + m[3].padEnd(3,"0")) : 0;

        lyrics.push({
          time: min * 60 + sec + ms,
          text: cleanText
        });
      });
    });

    lyrics.sort((a,b) => a.time - b.time);

    if(!lyrics.length){
      throw new Error("LRC leeg of verkeerd formaat");
    }

    lyricsTrack.innerHTML = lyrics.map((l,i) =>
      `<div class="line" id="line-${i}">${escapeHtml(l.text)}</div>`
    ).join("");

    statusLeft.textContent = lyrics.length + " lyric lines loaded";
  }catch(e){
    statusLeft.textContent = "ERROR: Araxos Baby.lrc niet gevonden of verkeerd formaat";
    lyricsTrack.innerHTML = `<div class="line active">ARAXOS BABY.LRC NIET GELADEN</div>`;
  }
}

function escapeHtml(str){
  return str.replace(/[&<>"']/g, c => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    '"':"&quot;",
    "'":"&#039;"
  }[c]));
}

async function enterKaraoke(){
  jetSound.currentTime = 0;
  jetSound.volume = 1;
  jetSound.play().catch(()=>{});

  jet.classList.remove("fly");
  void jet.offsetWidth;
  jet.classList.add("fly");

  document.body.classList.add("shake");

  setTimeout(() => {
    document.body.classList.remove("shake");
  }, 700);

  setTimeout(() => {
    enterScreen.style.display = "none";
    karaokeScreen.style.display = "block";

    bgVideo.currentTime = 0;
    bgVideo.play().catch(()=>{});

    statusLeft.textContent = "Araxos Baby starts in 4 seconds...";
    statusRight.textContent = "Jet intro complete";
  }, 1700);

  setTimeout(async () => {
    audio.currentTime = 0;
    audio.volume = 1;

    try{
      await audio.play();
      statusLeft.textContent = "Playing — Tiger mode";
      updateLyrics(true);
    }catch(e){
      statusLeft.textContent = "Audio blocked. Druk op PLAY.";
    }
  }, SONG_DELAY_MS);
}

function playSong(){
  audio.play().then(() => {
    bgVideo.play().catch(()=>{});
    statusLeft.textContent = "Playing";
  }).catch(() => {
    statusLeft.textContent = "Audio speelt niet. Check exact: Araxos Baby .mp3";
  });
}

function pauseSong(){
  audio.pause();
  bgVideo.pause();
  statusLeft.textContent = "Paused";
}

function stopSong(){
  audio.pause();
  audio.currentTime = 0;

  bgVideo.pause();
  bgVideo.currentTime = 0;

  lastActiveIndex = -1;
  updateLyrics(true);
  statusLeft.textContent = "Stopped";
}

function toggleRepeat(){
  repeat = !repeat;
  audio.loop = repeat;

  repeatBtn.textContent = repeat ? "REPEAT ON" : "REPEAT OFF";
  repeatBtn.classList.toggle("active", repeat);
}

function updateLyrics(force=false){
  if(!lyrics.length) return;

  const t = audio.currentTime + LYRIC_OFFSET_SECONDS;
  let activeIndex = 0;

  for(let i = 0; i < lyrics.length; i++){
    if(t >= lyrics[i].time) activeIndex = i;
    else break;
  }

  statusRight.textContent =
    formatTime(audio.currentTime) + " / " + formatTime(audio.duration || 0);

  if(activeIndex === lastActiveIndex && !force) return;

  lastActiveIndex = activeIndex;

  document.querySelectorAll(".line").forEach((el,i) => {
    el.classList.toggle("active", i === activeIndex);
    el.classList.toggle("passed", i < activeIndex);
  });

  const activeLine = document.getElementById("line-" + activeIndex);

  if(activeLine){
    const viewportCenter = document.getElementById("lyricsViewport").clientHeight / 2;
    const lineCenter = activeLine.offsetTop + activeLine.offsetHeight / 2;
    const target = viewportCenter - lineCenter;

    lyricsTrack.style.transform = `translateY(${target}px)`;
  }
}

function formatTime(seconds){
  if(!isFinite(seconds)) return "0:00";
  const m = Math.floor(seconds / 60);
  const s = Math.floor(seconds % 60).toString().padStart(2,"0");
  return `${m}:${s}`;
}

audio.addEventListener("timeupdate", updateLyrics);

audio.addEventListener("error", () => {
  statusLeft.textContent = "ERROR: muziekbestand niet gevonden. Check exact: Araxos Baby .mp3";
});

bgVideo.addEventListener("error", () => {
  statusLeft.textContent = "ERROR: simone.mp4 niet gevonden";
});

jetSound.addEventListener("error", () => {
  statusLeft.textContent = "ERROR: jet.mp3 niet gevonden";
});

audio.addEventListener("ended", () => {
  if(!repeat){
    statusLeft.textContent = "Finished — Tiger mode complete";
  }
});

loadLRC();
</script>

</body>
</html>
