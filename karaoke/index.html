<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Tiger Karaoke Araxos</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

html,body{
  width:100%;height:100%;overflow:hidden;background:#020202;color:white;
  font-family:Arial,Helvetica,sans-serif;
}

body{
  background:radial-gradient(circle at top,rgba(255,136,0,.35),transparent 42%),
  linear-gradient(145deg,#030303,#111,#000);
}

#enterScreen{
  position:fixed;inset:0;z-index:50;display:flex;justify-content:center;align-items:center;
  text-align:center;overflow:hidden;
  background:linear-gradient(rgba(0,0,0,.65),rgba(0,0,0,.84)),
  repeating-linear-gradient(45deg,#ff8800 0,#ff8800 22px,#000 22px,#000 44px);
}

#loginVideo{
  position:absolute;inset:0;width:100%;height:100%;object-fit:contain;background:#000;
  z-index:0;opacity:.92;display:none;
}

.loginOverlay{
  position:absolute;inset:0;z-index:1;
  background:radial-gradient(circle at center,rgba(0,0,0,.02),rgba(0,0,0,.68)),
  linear-gradient(rgba(0,0,0,.08),rgba(0,0,0,.58));
}

.enterContent{position:relative;z-index:5;padding:24px}
.logo{
  font-size:clamp(38px,8vw,82px);font-weight:1000;color:#ff9d00;
  text-shadow:0 0 22px orange,0 0 45px #ff5500;letter-spacing:2px;
}
.sub{color:#eee;font-size:18px;margin:14px 0 30px;text-shadow:0 0 8px #000}
.enterBtn{
  background:linear-gradient(180deg,#ffb000,#ff7700);color:#000;border:none;
  padding:19px 36px;border-radius:18px;font-size:23px;font-weight:1000;
  box-shadow:0 0 35px rgba(255,136,0,.85);cursor:pointer;
}
.creatorEnter{margin-top:18px;font-size:13px;letter-spacing:2px;color:#ddd;text-shadow:0 0 8px #000}

#jet{
  position:fixed;left:-55vw;top:42%;z-index:90;width:min(560px,78vw);display:none;
  filter:drop-shadow(0 0 20px orange) drop-shadow(0 0 55px #ff4d00);
}
#jet.fly{display:block;animation:flyby 3s cubic-bezier(.08,.9,.18,1) forwards}
.afterburner{
  position:absolute;left:-170px;top:50%;width:230px;height:44px;transform:translateY(-50%);
  border-radius:50%;background:linear-gradient(90deg,rgba(255,60,0,0),rgba(255,136,0,.95),rgba(255,255,255,.95));
  filter:blur(5px);animation:burn .09s infinite alternate;
}
#jet img{width:100%;display:block;transform:rotate(5deg)}
@keyframes burn{from{transform:translateY(-50%) scaleX(.8);opacity:.7}to{transform:translateY(-50%) scaleX(1.25);opacity:1}}
@keyframes flyby{
  0%{left:-60vw;top:56%;transform:scale(.65) rotate(2deg)}
  35%{left:24%;top:37%;transform:scale(1.45) rotate(0deg)}
  58%{left:48%;top:31%;transform:scale(1.85) rotate(-2deg)}
  100%{left:125%;top:12%;transform:scale(.85) rotate(-8deg)}
}
.shake{animation:shake .55s}
@keyframes shake{
  0%,100%{transform:translate(0,0)}
  20%{transform:translate(-13px,7px)}
  40%{transform:translate(10px,-7px)}
  60%{transform:translate(-8px,-5px)}
  80%{transform:translate(7px,7px)}
}

#karaokeScreen{position:fixed;inset:0;display:none;background:#000}

#bgVideo{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:contain;
  z-index:0;
  opacity:.9;
  background:#000;
}

.overlay{
  position:absolute;inset:0;z-index:1;
  background:radial-gradient(circle at center,rgba(0,0,0,.02),rgba(0,0,0,.54) 78%),
  linear-gradient(rgba(0,0,0,.05),rgba(0,0,0,.42));
  pointer-events:none;
}

.scanlines{
  position:absolute;inset:0;z-index:2;pointer-events:none;opacity:.12;
  background:repeating-linear-gradient(to bottom,rgba(255,255,255,.08) 0,rgba(255,255,255,.08) 1px,transparent 1px,transparent 5px);
}

.disco{
  position:absolute;top:82px;z-index:3;font-size:42px;opacity:.78;pointer-events:none;
  filter:drop-shadow(0 0 18px #fff) drop-shadow(0 0 30px orange);
  animation:discoSpin 3s linear infinite, discoFloat 4s ease-in-out infinite alternate;
}
.disco.left{left:24px}
.disco.right{right:24px;animation-duration:3.8s,4.6s}
@keyframes discoSpin{to{transform:rotate(360deg)}}
@keyframes discoFloat{from{top:74px}to{top:105px}}

.lightBeam{
  position:absolute;top:0;width:38vw;height:100vh;z-index:2;pointer-events:none;opacity:.18;
  background:linear-gradient(to bottom,rgba(255,170,0,.5),rgba(255,170,0,0));
  clip-path:polygon(46% 0,54% 0,100% 100%,0 100%);
  filter:blur(8px);
  animation:beamMove 5s ease-in-out infinite alternate;
}
.lightBeam.one{left:5%;transform-origin:top center}
.lightBeam.two{right:5%;animation-delay:1.2s;transform-origin:top center}
@keyframes beamMove{from{transform:rotate(-14deg)}to{transform:rotate(14deg)}}

.header{
  position:absolute;top:12px;left:12px;right:12px;z-index:5;
  display:flex;justify-content:space-between;align-items:center;gap:10px;
}
.title{font-size:20px;font-weight:1000;color:#ff9d00;text-shadow:0 0 15px #000}
.creator{font-size:12px;color:#ddd;letter-spacing:2px;text-transform:uppercase}

.controls{display:flex;gap:7px;flex-wrap:wrap;justify-content:flex-end}
.controls button,.controls a{
  text-decoration:none;border:none;background:rgba(255,136,0,.94);color:#000;font-weight:1000;
  border-radius:12px;padding:10px 13px;cursor:pointer;font-size:13px;
  box-shadow:0 0 15px rgba(0,0,0,.4);
}
.controls button.active{background:#fff;box-shadow:0 0 15px orange}

.tigerGamesBtn{
  position:relative;
  background:linear-gradient(90deg,#ff7700,#ffcc00,#fff200,#ff7700)!important;
  color:#000!important;
  animation:tigerGlow 1s ease-in-out infinite alternate, tigerWiggle 2.4s ease-in-out infinite;
  box-shadow:0 0 18px orange,0 0 38px #ff4d00,0 0 70px rgba(255,170,0,.6)!important;
}
.tigerGamesBtn::after{
  content:"PLAY";
  position:absolute;
  top:-11px;right:-9px;
  background:#fff;color:#000;
  font-size:9px;font-weight:1000;
  padding:2px 5px;border-radius:99px;
  box-shadow:0 0 12px #fff;
}
@keyframes tigerGlow{
  from{filter:brightness(1);transform:scale(1)}
  to{filter:brightness(1.35);transform:scale(1.08)}
}
@keyframes tigerWiggle{
  0%,100%{rotate:0deg}
  45%{rotate:0deg}
  50%{rotate:2deg}
  55%{rotate:-2deg}
  60%{rotate:0deg}
}

#countdown{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:8;font-size:clamp(42px,9vw,115px);font-weight:1000;color:#ff9d00;
  text-shadow:0 0 25px orange,0 0 70px #ff4d00;display:none;
}

#lyricsViewport{
  position:absolute;inset:92px 0 58px 0;z-index:4;overflow:hidden;text-align:center;pointer-events:none;
}
#lyricsTrack{
  position:absolute;top:50%;left:0;right:0;transform:translateY(0);
  transition:transform 1.25s cubic-bezier(.18,.75,.2,1);will-change:transform;
}

.line{
  font-size:clamp(29px,6.4vw,76px);line-height:1.08;font-weight:1000;letter-spacing:1px;
  text-transform:uppercase;opacity:.38;margin:32px auto;max-width:1200px;color:white;
  text-shadow:0 0 8px rgba(0,0,0,.95),0 0 18px rgba(0,0,0,.95),4px 4px 0 #000;
  transition:opacity .45s,color .45s,transform .45s,text-shadow .45s;
}
.line.active{
  opacity:1;color:#ffae00;transform:scale(1.08);
  animation:karaokeGlow 1.2s ease-in-out infinite alternate;
}
.line.passed{opacity:.3}
@keyframes karaokeGlow{
  from{text-shadow:0 0 8px rgba(0,0,0,.95),0 0 14px orange,4px 4px 0 #000}
  to{text-shadow:0 0 10px rgba(0,0,0,.98),0 0 24px #ff9900,0 0 42px rgba(255,140,0,.75),4px 4px 0 #000}
}

.tigerRunner{
  position:absolute;z-index:7;font-size:44px;pointer-events:none;
  filter:drop-shadow(0 0 12px orange);
  animation:tigerRun 5.8s linear forwards;
}
@keyframes tigerRun{
  0%{left:-80px;transform:scaleX(1) rotate(-4deg)}
  50%{transform:scaleX(1) rotate(4deg)}
  100%{left:110vw;transform:scaleX(1) rotate(-4deg)}
}

.confettiPiece{
  position:absolute;z-index:20;width:10px;height:16px;pointer-events:none;
  opacity:.95;border-radius:2px;
  animation:confettiFall 2.8s linear forwards;
}
@keyframes confettiFall{
  0%{transform:translateY(-20vh) rotate(0deg);opacity:1}
  100%{transform:translateY(120vh) rotate(720deg);opacity:0}
}

.progressWrap{
  position:absolute;left:12px;right:12px;bottom:6px;height:5px;z-index:8;
  background:rgba(255,255,255,.18);border-radius:99px;overflow:hidden;
}
#progressBar{
  height:100%;width:0%;background:linear-gradient(90deg,#ff7700,#ffcc00,#fff);
  box-shadow:0 0 15px orange;
}

.status{
  position:absolute;bottom:18px;left:12px;right:12px;z-index:6;font-size:13px;color:#eee;
  opacity:.95;text-shadow:0 0 8px #000;display:flex;justify-content:space-between;gap:10px;
}
.watermark{
  position:absolute;right:16px;bottom:42px;z-index:6;font-size:12px;letter-spacing:3px;
  color:rgba(255,255,255,.65);text-shadow:0 0 10px #000;
}
#audio,#jetSound{display:none}

@media(max-width:700px){
  .header{flex-direction:column;align-items:flex-start}
  #lyricsViewport{inset:150px 0 65px 0}
  .controls{justify-content:flex-start}
  #jet{width:92vw}
  .watermark{bottom:62px}
  .disco{font-size:32px;top:128px}
  .disco.left{left:12px}
  .disco.right{right:12px}
  #bgVideo{
  object-fit:cover;
}
}
</style>
</head>

<body>

<div id="enterScreen">
  <video id="loginVideo" src="login.mp4" autoplay muted loop playsinline></video>
  <div class="loginOverlay"></div>
  <div class="enterContent">
    <div class="logo">TIGER KARAOKE</div>
    <div class="sub">Araxos Baby - V3.1<br>Double P con Jo Chen</div>
    <button class="enterBtn" onclick="enterKaraoke()">ENTER ARAXOS BABY</button>
 
  </div>
</div>

<div id="jet">
  <div class="afterburner"></div>
  <img src="jet.png" alt="Jet">
</div>

<div id="karaokeScreen">
  <video id="bgVideo" muted playsinline></video>

  <div class="overlay"></div>
  <div class="scanlines"></div>
  <div class="lightBeam one"></div>
  <div class="lightBeam two"></div>
  <div class="disco left">🪩</div>
  <div class="disco right">🪩</div>
  <div id="countdown">3</div>

  <div class="header">
    <div>
      <div class="title">TIGERMEET ARAXOS — KARAOKE MODE</div>
      <div class="creator">Jochen M - Starring Félipé</div>
    </div>
    <div class="controls">
      <a class="tigerGamesBtn" href="/tigergames/">TIGERGAMES</a>
      <button onclick="playSong()">PLAY</button>
      <button onclick="pauseSong()">PAUSE</button>
      <button onclick="stopSong()">STOP</button>
      <button onclick="nextBgVideo()">NEXT VIDEO</button>
      <button id="repeatBtn" onclick="toggleRepeat()">REPEAT OFF</button>
    </div>
  </div>

  <div id="lyricsViewport">
    <div id="lyricsTrack"></div>
  </div>

  <audio id="audio" preload="auto" src="Araxos Baby .mp3"></audio>
  <audio id="jetSound" preload="auto" src="jet.mp3"></audio>

  <div class="watermark">JOCHEN M</div>

  <div class="status">
    <span id="statusLeft">Loading...</span>
    <span id="statusRight">Tiger mode standby</span>
  </div>

  <div class="progressWrap"><div id="progressBar"></div></div>
</div>

<script>
const enterScreen = document.getElementById("enterScreen");
const karaokeScreen = document.getElementById("karaokeScreen");
const jet = document.getElementById("jet");
const audio = document.getElementById("audio");
const jetSound = document.getElementById("jetSound");
const bgVideo = document.getElementById("bgVideo");
const loginVideo = document.getElementById("loginVideo");
const lyricsTrack = document.getElementById("lyricsTrack");
const statusLeft = document.getElementById("statusLeft");
const statusRight = document.getElementById("statusRight");
const repeatBtn = document.getElementById("repeatBtn");
const countdown = document.getElementById("countdown");
const progressBar = document.getElementById("progressBar");
const karaokeScreenEl = document.getElementById("karaokeScreen");

const SONG_DELAY_MS = 3000;
const JET_SOUND_MAX_MS = 3000;
const LYRIC_OFFSET_SECONDS = 0.45;

const bgVideos = [
  "simone.mp4",
  "1.mp4","2.mp4","3.mp4","4.mp4","5.mp4","6.mp4","7.mp4","8.mp4"
];

let lyrics = [];
let repeat = false;
let lastActiveIndex = -1;
let startTimeout = null;
let currentBgVideo = -1;
let tigerTimer = null;
let confettiTimer = null;

loginVideo.addEventListener("loadeddata",()=>{loginVideo.style.display="block"});
loginVideo.addEventListener("error",()=>{loginVideo.style.display="none"});

function playRandomBgVideo(){
  let next;
  do{next = Math.floor(Math.random() * bgVideos.length)}
  while(next === currentBgVideo && bgVideos.length > 1);

  currentBgVideo = next;
  bgVideo.src = bgVideos[currentBgVideo];
  bgVideo.currentTime = 0;
  bgVideo.muted = true;
  bgVideo.play().catch(()=>{});
  statusLeft.textContent = "Background: " + bgVideos[currentBgVideo];
}

function nextBgVideo(){playRandomBgVideo()}

bgVideo.addEventListener("ended",()=>{playRandomBgVideo()});
bgVideo.addEventListener("error",()=>{
  statusLeft.textContent = "ERROR: background video niet gevonden: " + bgVideos[currentBgVideo];
  playRandomBgVideo();
});

async function loadLRC(){
  try{
    const res = await fetch("Araxos Baby.lrc?cache=" + Date.now());
    if(!res.ok) throw new Error("Araxos Baby.lrc not found");

    const text = await res.text();
    lyrics = [];

    text.split(/\r?\n/).forEach(line=>{
      const matches = [...line.matchAll(/\[(\d{1,2}):(\d{2})(?:[.:](\d{1,3}))?\]/g)];
      const cleanText = line.replace(/\[[^\]]+\]/g,"").trim();
      if(!matches.length || !cleanText) return;

      matches.forEach(m=>{
        const min = parseInt(m[1],10);
        const sec = parseInt(m[2],10);
        const ms = m[3] ? parseFloat("0." + m[3].padEnd(3,"0")) : 0;
        lyrics.push({time:min*60+sec+ms,text:cleanText});
      });
    });

    lyrics.sort((a,b)=>a.time-b.time);
    if(!lyrics.length) throw new Error("LRC leeg");

    lyricsTrack.innerHTML = lyrics.map((l,i)=>
      `<div class="line" id="line-${i}">${escapeHtml(l.text)}</div>`
    ).join("");

    statusLeft.textContent = lyrics.length + " lyric lines loaded";
    requestAnimationFrame(()=>centerLine(0,true));
  }catch(e){
    statusLeft.textContent = "ERROR: Araxos Baby.lrc niet gevonden of verkeerd formaat";
    lyricsTrack.innerHTML = `<div class="line active">ARAXOS BABY.LRC NIET GELADEN</div>`;
  }
}

function escapeHtml(str){
  return str.replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]));
}

async function enterKaraoke(){
  clearTimeout(startTimeout);

  jetSound.currentTime = 0;
  jetSound.volume = 1;
  jetSound.play().catch(()=>{});

  setTimeout(()=>{
    jetSound.pause();
    jetSound.currentTime = 0;
  }, JET_SOUND_MAX_MS);

  jet.classList.remove("fly");
  void jet.offsetWidth;
  jet.classList.add("fly");

  document.body.classList.add("shake");
  setTimeout(()=>document.body.classList.remove("shake"),700);

  setTimeout(()=>{
    enterScreen.style.display = "none";
    karaokeScreen.style.display = "block";

    playRandomBgVideo();
    startTigerChaos();
    startConfettiChaos();

    lastActiveIndex = -1;
    centerLine(0,true);
    showCountdown();
    statusLeft.textContent = "Araxos Baby starts in 3 seconds...";
    statusRight.textContent = "Jet intro complete";
  },900);

  startTimeout = setTimeout(async()=>{
    audio.currentTime = 0;
    audio.volume = 1;

    try{
      await audio.play();
      countdown.style.display = "none";
      statusLeft.textContent = "Playing — Tiger mode";
      updateLyrics(true);
      burstConfetti(45);
    }catch(e){
      countdown.style.display = "none";
      statusLeft.textContent = "Audio blocked. Druk op PLAY.";
    }
  }, SONG_DELAY_MS);
}

function showCountdown(){
  countdown.style.display = "block";
  countdown.textContent = "3";
  setTimeout(()=>countdown.textContent="2",1000);
  setTimeout(()=>countdown.textContent="1",2000);
}

function playSong(){
  audio.play().then(()=>{
    bgVideo.play().catch(()=>{});
    statusLeft.textContent = "Playing";
  }).catch(()=>{
    statusLeft.textContent = "Audio speelt niet. Check exact: Araxos Baby .mp3";
  });
}

function pauseSong(){
  audio.pause();
  bgVideo.pause();
  statusLeft.textContent = "Paused";
}

function stopSong(){
  clearTimeout(startTimeout);
  audio.pause();
  audio.currentTime = 0;
  bgVideo.pause();
  progressBar.style.width = "0%";
  lastActiveIndex = -1;
  centerLine(0,true);
  updateLyrics(true);
  statusLeft.textContent = "Stopped";
}

function toggleRepeat(){
  repeat = !repeat;
  audio.loop = repeat;
  repeatBtn.textContent = repeat ? "REPEAT ON" : "REPEAT OFF";
  repeatBtn.classList.toggle("active", repeat);
}

function centerLine(index, instant=false){
  const activeLine = document.getElementById("line-" + index);
  if(!activeLine) return;

  if(instant) lyricsTrack.style.transition = "none";

  const lineCenter = activeLine.offsetTop + activeLine.offsetHeight / 2;
  lyricsTrack.style.transform = `translateY(${-lineCenter}px)`;

  if(instant){
    requestAnimationFrame(()=>{
      lyricsTrack.style.transition = "transform 1.25s cubic-bezier(.18,.75,.2,1)";
    });
  }
}

function updateLyrics(force=false){
  if(!lyrics.length) return;

  const t = audio.currentTime + LYRIC_OFFSET_SECONDS;
  let activeIndex = 0;

  for(let i=0;i<lyrics.length;i++){
    if(t >= lyrics[i].time) activeIndex = i;
    else break;
  }

  statusRight.textContent = formatTime(audio.currentTime) + " / " + formatTime(audio.duration || 0);

  if(isFinite(audio.duration) && audio.duration > 0){
    progressBar.style.width = Math.min(100,(audio.currentTime/audio.duration)*100) + "%";
  }

  if(activeIndex === lastActiveIndex && !force) return;
  lastActiveIndex = activeIndex;

  document.querySelectorAll(".line").forEach((el,i)=>{
    el.classList.toggle("active", i === activeIndex);
    el.classList.toggle("passed", i < activeIndex);
  });

  centerLine(activeIndex);

  if(activeIndex > 0 && activeIndex % 8 === 0){
    burstConfetti(22);
  }
}

function startTigerChaos(){
  clearInterval(tigerTimer);
  tigerTimer = setInterval(()=>{
    spawnTiger();
  }, 5200);
  setTimeout(spawnTiger, 1800);
}

function spawnTiger(){
  const tiger = document.createElement("div");
  tiger.className = "tigerRunner";
  tiger.textContent = Math.random() > .45 ? "🐅" : "🐯";
  tiger.style.top = (20 + Math.random() * 68) + "vh";
  tiger.style.fontSize = (32 + Math.random() * 30) + "px";
  tiger.style.animationDuration = (4.8 + Math.random() * 3.2) + "s";

  if(Math.random() > .5){
    tiger.style.transform = "scaleX(-1)";
    tiger.style.left = "110vw";
    tiger.style.animationName = "none";
    tiger.animate([
      {left:"110vw", transform:"scaleX(-1) rotate(4deg)"},
      {left:"-90px", transform:"scaleX(-1) rotate(-4deg)"}
    ], {duration:6000, easing:"linear", fill:"forwards"});
  }

  karaokeScreenEl.appendChild(tiger);
  setTimeout(()=>tiger.remove(), 7500);
}

function startConfettiChaos(){
  clearInterval(confettiTimer);
  confettiTimer = setInterval(()=>{
    if(!audio.paused) burstConfetti(18);
  }, 18000);
}

function burstConfetti(amount=35){
  const colors = ["#ff8800","#ffcc00","#ffffff","#ff3300","#111111"];
  for(let i=0;i<amount;i++){
    const piece = document.createElement("div");
    piece.className = "confettiPiece";
    piece.style.left = Math.random() * 100 + "vw";
    piece.style.top = "-30px";
    piece.style.background = colors[Math.floor(Math.random()*colors.length)];
    piece.style.animationDuration = (2.2 + Math.random()*1.8) + "s";
    piece.style.transform = `rotate(${Math.random()*360}deg)`;
    piece.style.width = (6 + Math.random()*10) + "px";
    piece.style.height = (8 + Math.random()*16) + "px";
    karaokeScreenEl.appendChild(piece);
    setTimeout(()=>piece.remove(), 4300);
  }
}

function formatTime(seconds){
  if(!isFinite(seconds)) return "0:00";
  const m = Math.floor(seconds/60);
  const s = Math.floor(seconds%60).toString().padStart(2,"0");
  return `${m}:${s}`;
}

karaokeScreenEl.addEventListener("click",(e)=>{
  if(e.target.closest(".controls")) return;
  nextBgVideo();
});

audio.addEventListener("timeupdate", updateLyrics);
audio.addEventListener("error",()=>{statusLeft.textContent="ERROR: muziekbestand niet gevonden. Check exact: Araxos Baby .mp3"});
jetSound.addEventListener("error",()=>{statusLeft.textContent="ERROR: jet.mp3 niet gevonden"});
audio.addEventListener("ended",()=>{if(!repeat) statusLeft.textContent="Finished — Tiger mode complete"});

loadLRC();
</script>

</body>
</html>
