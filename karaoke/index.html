<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Tiger Karaoke Araxos</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#050505;
  color:white;
  font-family:Arial,Helvetica,sans-serif;
}

body{
  background:
    radial-gradient(circle at top,rgba(255,136,0,.35),transparent 40%),
    linear-gradient(145deg,#050505,#111,#000);
}

#enterScreen{
  position:fixed;
  inset:0;
  z-index:20;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  background:
    linear-gradient(rgba(0,0,0,.82),rgba(0,0,0,.94)),
    repeating-linear-gradient(45deg,#ff8800 0,#ff8800 22px,#000 22px,#000 44px);
}

.logo{
  font-size:48px;
  font-weight:900;
  color:#ff9d00;
  text-shadow:0 0 22px orange;
  letter-spacing:2px;
  margin-bottom:10px;
}

.sub{
  color:#ddd;
  font-size:18px;
  margin-bottom:28px;
}

.enterBtn{
  background:#ff8800;
  color:#000;
  border:none;
  padding:18px 34px;
  border-radius:18px;
  font-size:23px;
  font-weight:900;
  box-shadow:0 0 30px rgba(255,136,0,.7);
  cursor:pointer;
}

.enterBtn:active{transform:scale(.96)}

.jet{
  position:fixed;
  left:-220px;
  top:42%;
  z-index:30;
  font-size:95px;
  filter:drop-shadow(0 0 20px orange);
  transform:rotate(8deg);
  display:none;
}

.jet.fly{
  display:block;
  animation:flyby 2.2s ease-in forwards;
}

@keyframes flyby{
  0%{left:-240px;top:48%;transform:rotate(8deg) scale(.7)}
  45%{left:45%;top:34%;transform:rotate(4deg) scale(1.2)}
  100%{left:120%;top:24%;transform:rotate(-4deg) scale(.9)}
}

.shake{animation:shake .45s}
@keyframes shake{
  0%,100%{transform:translate(0,0)}
  20%{transform:translate(-10px,5px)}
  40%{transform:translate(8px,-6px)}
  60%{transform:translate(-6px,-4px)}
  80%{transform:translate(5px,6px)}
}

#karaokeScreen{
  position:fixed;
  inset:0;
  display:none;
  background:#000;
}

#bgVideo{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:0;
  opacity:.78;
}

.overlay{
  position:absolute;
  inset:0;
  z-index:1;
  background:
    linear-gradient(rgba(0,0,0,.25),rgba(0,0,0,.65)),
    radial-gradient(circle at center,transparent 25%,rgba(0,0,0,.7));
}

.header{
  position:absolute;
  top:12px;
  left:12px;
  right:12px;
  z-index:5;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}

.title{
  font-size:20px;
  font-weight:900;
  color:#ff9d00;
  text-shadow:0 0 15px #000;
}

.controls{
  display:flex;
  gap:7px;
  flex-wrap:wrap;
  justify-content:flex-end;
}

.controls button{
  border:none;
  background:rgba(255,136,0,.92);
  color:#000;
  font-weight:900;
  border-radius:11px;
  padding:9px 12px;
  cursor:pointer;
}

.controls button.active{
  background:#fff;
  box-shadow:0 0 15px orange;
}

#lyricsBox{
  position:absolute;
  inset:80px 0 40px 0;
  z-index:4;
  overflow:hidden;
  padding:34vh 18px 40vh;
  scroll-behavior:smooth;
  text-align:center;
}

.line{
  font-size:clamp(27px,6vw,72px);
  line-height:1.12;
  font-weight:1000;
  letter-spacing:1px;
  text-transform:uppercase;
  opacity:.22;
  margin:28px auto;
  max-width:1150px;
  color:white;
  text-shadow:
    0 0 8px #000,
    0 0 18px #000,
    3px 3px 0 #000;
  transition:.25s;
}

.line.active{
  opacity:1;
  color:#ff9d00;
  transform:scale(1.12);
  text-shadow:
    0 0 8px #000,
    0 0 18px #000,
    0 0 28px orange,
    4px 4px 0 #000;
}

#audio{
  display:none;
}

.status{
  position:absolute;
  bottom:10px;
  left:12px;
  z-index:6;
  font-size:13px;
  color:#ddd;
  opacity:.85;
}

@media(max-width:600px){
  .logo{font-size:34px}
  .sub{font-size:15px}
  .header{
    flex-direction:column;
    align-items:flex-start;
  }
  #lyricsBox{
    inset:125px 0 35px 0;
  }
  .controls{
    justify-content:flex-start;
  }
}
</style>
</head>

<body>

<div id="enterScreen">
  <div class="logo">TIGER KARAOKE</div>
  <div class="sub">Tigermeet Araxos - V7.73<br>Jo Chen Edition</div>
  <button class="enterBtn" onclick="enterKaraoke()">ENTER ARAXOS BABY</button>
</div>

<div class="jet" id="jet">✈️</div>

<div id="karaokeScreen">
  <video id="bgVideo" src="simone.mp4" autoplay muted loop playsinline></video>
  <div class="overlay"></div>

  <div class="header">
    <div class="title">TIGERMEET ARAXOS — KARAOKE MODE</div>

    <div class="controls">
      <button onclick="playSong()">PLAY</button>
      <button onclick="pauseSong()">PAUSE</button>
      <button onclick="stopSong()">STOP</button>
      <button id="repeatBtn" onclick="toggleRepeat()">REPEAT OFF</button>
    </div>
  </div>

  <div id="lyricsBox"></div>

  <audio id="audio" src="Araxos Baby.mp3"></audio>

  <div class="status" id="status">Loading lyrics...</div>
</div>

<script>
const enterScreen = document.getElementById("enterScreen");
const karaokeScreen = document.getElementById("karaokeScreen");
const jet = document.getElementById("jet");
const audio = document.getElementById("audio");
const bgVideo = document.getElementById("bgVideo");
const lyricsBox = document.getElementById("lyricsBox");
const statusText = document.getElementById("status");
const repeatBtn = document.getElementById("repeatBtn");

let lyrics = [];
let repeat = false;
let lastActiveIndex = -1;

async function loadLRC(){
  try{
    const res = await fetch("lyrics.lrc?cache=" + Date.now());
    const text = await res.text();

    lyrics = [];

    text.split(/\r?\n/).forEach(line => {
      const matches = [...line.matchAll(/\[(\d{1,2}):(\d{2})(?:\.(\d{1,3}))?\]/g)];
      const cleanText = line.replace(/\[[^\]]+\]/g,"").trim();

      if(!matches.length || !cleanText) return;

      matches.forEach(m => {
        const min = parseInt(m[1],10);
        const sec = parseInt(m[2],10);
        const ms = m[3] ? parseFloat("0." + m[3]) : 0;
        lyrics.push({
          time: min * 60 + sec + ms,
          text: cleanText
        });
      });
    });

    lyrics.sort((a,b) => a.time - b.time);

    lyricsBox.innerHTML = lyrics.map((l,i) =>
      `<div class="line" id="line-${i}">${escapeHtml(l.text)}</div>`
    ).join("");

    statusText.textContent = lyrics.length + " lyric lines loaded";
  }catch(e){
    statusText.textContent = "ERROR: lyrics.lrc niet gevonden";
    lyricsBox.innerHTML = `<div class="line active">lyrics.lrc niet gevonden, gast</div>`;
  }
}

function escapeHtml(str){
  return str.replace(/[&<>"']/g, c => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    '"':"&quot;",
    "'":"&#039;"
  }[c]));
}

function enterKaraoke(){
  jet.classList.add("fly");
  document.body.classList.add("shake");

  setTimeout(() => {
    enterScreen.style.display = "none";
    karaokeScreen.style.display = "block";

    bgVideo.play().catch(()=>{});
    audio.play().catch(()=>{});

    document.body.classList.remove("shake");
  }, 2200);
}

function playSong(){
  audio.play();
  bgVideo.play().catch(()=>{});
}

function pauseSong(){
  audio.pause();
  bgVideo.pause();
}

function stopSong(){
  audio.pause();
  audio.currentTime = 0;
  bgVideo.pause();
  bgVideo.currentTime = 0;
  updateLyrics(true);
}

function toggleRepeat(){
  repeat = !repeat;
  audio.loop = repeat;
  repeatBtn.textContent = repeat ? "REPEAT ON" : "REPEAT OFF";
  repeatBtn.classList.toggle("active", repeat);
}

function updateLyrics(force=false){
  if(!lyrics.length) return;

  const t = audio.currentTime;
  let activeIndex = 0;

  for(let i = 0; i < lyrics.length; i++){
    if(t >= lyrics[i].time) activeIndex = i;
    else break;
  }

  if(activeIndex === lastActiveIndex && !force) return;
  lastActiveIndex = activeIndex;

  document.querySelectorAll(".line").forEach((el,i) => {
    el.classList.toggle("active", i === activeIndex);
  });

  const activeLine = document.getElementById("line-" + activeIndex);
  if(activeLine){
    activeLine.scrollIntoView({
      behavior:"smooth",
      block:"center"
    });
  }

  statusText.textContent =
    formatTime(audio.currentTime) + " / " + formatTime(audio.duration || 0);
}

function formatTime(seconds){
  if(!isFinite(seconds)) return "0:00";
  const m = Math.floor(seconds / 60);
  const s = Math.floor(seconds % 60).toString().padStart(2,"0");
  return `${m}:${s}`;
}

audio.addEventListener("timeupdate", updateLyrics);

audio.addEventListener("ended", () => {
  if(!repeat){
    statusText.textContent = "Finished — Tiger mode complete";
  }
});

loadLRC();
</script>

</body>
</html>
