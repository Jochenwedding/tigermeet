<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Tiger Karaoke Araxos</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#020202;
  color:white;
  font-family:Arial,Helvetica,sans-serif;
}

body{
  background:
    radial-gradient(circle at top,rgba(255,136,0,.32),transparent 42%),
    linear-gradient(145deg,#030303,#111,#000);
}

#enterScreen{
  position:fixed;
  inset:0;
  z-index:50;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  background:
    linear-gradient(rgba(0,0,0,.78),rgba(0,0,0,.94)),
    repeating-linear-gradient(45deg,#ff8800 0,#ff8800 22px,#000 22px,#000 44px);
}

.logo{
  font-size:clamp(38px,8vw,82px);
  font-weight:1000;
  color:#ff9d00;
  text-shadow:0 0 22px orange,0 0 45px #ff5500;
  letter-spacing:2px;
}

.sub{
  color:#eee;
  font-size:18px;
  margin:14px 0 30px;
  text-shadow:0 0 8px #000;
}

.enterBtn{
  background:linear-gradient(180deg,#ffb000,#ff7700);
  color:#000;
  border:none;
  padding:19px 36px;
  border-radius:18px;
  font-size:23px;
  font-weight:1000;
  box-shadow:0 0 35px rgba(255,136,0,.85);
  cursor:pointer;
}

.enterBtn:active{transform:scale(.96)}

.jet{
  position:fixed;
  left:-420px;
  top:46%;
  z-index:80;
  width:360px;
  height:120px;
  display:none;
  filter:drop-shadow(0 0 18px orange) drop-shadow(0 0 35px #ff5500);
}

.jet.fly{
  display:block;
  animation:flyby 1.55s cubic-bezier(.12,.8,.22,1) forwards;
}

.jetBody{
  position:absolute;
  inset:0;
  font-size:120px;
  line-height:120px;
  transform:rotate(6deg);
}

.afterburner{
  position:absolute;
  left:-145px;
  top:44px;
  width:170px;
  height:32px;
  border-radius:50%;
  background:linear-gradient(90deg,rgba(255,60,0,0),rgba(255,136,0,.9),rgba(255,255,255,.95));
  filter:blur(4px);
  animation:burn .12s infinite alternate;
}

@keyframes burn{
  from{transform:scaleX(.85);opacity:.7}
  to{transform:scaleX(1.25);opacity:1}
}

@keyframes flyby{
  0%{left:-430px;top:58%;transform:scale(.9) rotate(3deg)}
  38%{left:36%;top:38%;transform:scale(1.55) rotate(1deg)}
  62%{left:55%;top:32%;transform:scale(1.75) rotate(-2deg)}
  100%{left:120%;top:17%;transform:scale(.95) rotate(-7deg)}
}

.shake{animation:shake .5s}
@keyframes shake{
  0%,100%{transform:translate(0,0)}
  20%{transform:translate(-13px,7px)}
  40%{transform:translate(10px,-7px)}
  60%{transform:translate(-8px,-5px)}
  80%{transform:translate(7px,7px)}
}

#karaokeScreen{
  position:fixed;
  inset:0;
  display:none;
  background:
    radial-gradient(circle at center,rgba(255,136,0,.16),transparent 42%),
    #000;
}

.videoFrame{
  position:absolute;
  top:50%;
  left:50%;
  width:min(54vw,760px);
  height:min(54vh,430px);
  transform:translate(-50%,-50%);
  z-index:0;
  border-radius:28px;
  overflow:hidden;
  box-shadow:
    0 0 35px rgba(255,136,0,.5),
    0 0 90px rgba(255,80,0,.22);
  opacity:.82;
}

#bgVideo{
  width:100%;
  height:100%;
  object-fit:cover;
}

.overlay{
  position:absolute;
  inset:0;
  z-index:1;
  background:
    radial-gradient(circle at center,rgba(0,0,0,.08),rgba(0,0,0,.82) 72%),
    linear-gradient(rgba(0,0,0,.25),rgba(0,0,0,.72));
  pointer-events:none;
}

.header{
  position:absolute;
  top:12px;
  left:12px;
  right:12px;
  z-index:5;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}

.title{
  font-size:20px;
  font-weight:1000;
  color:#ff9d00;
  text-shadow:0 0 15px #000;
}

.controls{
  display:flex;
  gap:7px;
  flex-wrap:wrap;
  justify-content:flex-end;
}

.controls button{
  border:none;
  background:rgba(255,136,0,.94);
  color:#000;
  font-weight:1000;
  border-radius:11px;
  padding:9px 12px;
  cursor:pointer;
}

.controls button.active{
  background:#fff;
  box-shadow:0 0 15px orange;
}

#lyricsBox{
  position:absolute;
  inset:82px 0 48px 0;
  z-index:4;
  overflow:hidden;
  padding:34vh 18px 40vh;
  scroll-behavior:smooth;
  text-align:center;
}

.line{
  font-size:clamp(29px,6.4vw,76px);
  line-height:1.08;
  font-weight:1000;
  letter-spacing:1px;
  text-transform:uppercase;
  opacity:.18;
  margin:30px auto;
  max-width:1200px;
  color:white;
  text-shadow:
    0 0 8px #000,
    0 0 18px #000,
    4px 4px 0 #000;
  transition:.22s;
}

.line.active{
  opacity:1;
  color:#ff9d00;
  transform:scale(1.13);
  text-shadow:
    0 0 8px #000,
    0 0 20px #000,
    0 0 30px orange,
    5px 5px 0 #000;
}

#audio,#jetSound{display:none}

.status{
  position:absolute;
  bottom:10px;
  left:12px;
  right:12px;
  z-index:6;
  font-size:13px;
  color:#ddd;
  opacity:.9;
  text-shadow:0 0 8px #000;
}

@media(max-width:700px){
  .videoFrame{
    width:86vw;
    height:38vh;
  }

  .header{
    flex-direction:column;
    align-items:flex-start;
  }

  #lyricsBox{
    inset:128px 0 45px 0;
  }

  .controls{
    justify-content:flex-start;
  }

  .jet{
    width:300px;
  }

  .jetBody{
    font-size:100px;
  }
}
</style>
</head>

<body>

<div id="enterScreen">
  <div class="logo">TIGER KARAOKE</div>
  <div class="sub">Tigermeet Araxos - V7.73<br>Jo Chen Edition</div>
  <button class="enterBtn" onclick="enterKaraoke()">ENTER ARAXOS BABY</button>
</div>

<div class="jet" id="jet">
  <div class="afterburner"></div>
  <div class="jetBody">🛩️</div>
</div>

<div id="karaokeScreen">
  <div class="videoFrame">
    <video id="bgVideo" src="simone.mp4" muted loop playsinline></video>
  </div>

  <div class="overlay"></div>

  <div class="header">
    <div class="title">TIGERMEET ARAXOS — KARAOKE MODE</div>

    <div class="controls">
      <button onclick="playSong()">PLAY</button>
      <button onclick="pauseSong()">PAUSE</button>
      <button onclick="stopSong()">STOP</button>
      <button id="repeatBtn" onclick="toggleRepeat()">REPEAT OFF</button>
    </div>
  </div>

  <div id="lyricsBox"></div>

  <audio id="audio" preload="auto" src="Araxos Baby.mp3"></audio>
  <audio id="jetSound" preload="auto" src="jet.mp3"></audio>

  <div class="status" id="status">Loading...</div>
</div>

<script>
const enterScreen = document.getElementById("enterScreen");
const karaokeScreen = document.getElementById("karaokeScreen");
const jet = document.getElementById("jet");
const audio = document.getElementById("audio");
const jetSound = document.getElementById("jetSound");
const bgVideo = document.getElementById("bgVideo");
const lyricsBox = document.getElementById("lyricsBox");
const statusText = document.getElementById("status");
const repeatBtn = document.getElementById("repeatBtn");

let lyrics = [];
let repeat = false;
let lastActiveIndex = -1;

async function checkFile(url){
  try{
    const r = await fetch(url, { method:"HEAD", cache:"no-store" });
    return r.ok;
  }catch(e){
    return false;
  }
}

async function loadLRC(){
  try{
    const res = await fetch("lyrics.lrc?cache=" + Date.now());

    if(!res.ok){
      throw new Error("lyrics.lrc not found");
    }

    const text = await res.text();
    lyrics = [];

    text.split(/\r?\n/).forEach(line => {
      const matches = [...line.matchAll(/\[(\d{1,2}):(\d{2})(?:[.:](\d{1,3}))?\]/g)];
      const cleanText = line.replace(/\[[^\]]+\]/g,"").trim();

      if(!matches.length || !cleanText) return;

      matches.forEach(m => {
        const min = parseInt(m[1],10);
        const sec = parseInt(m[2],10);
        const ms = m[3] ? parseFloat("0." + m[3].padEnd(3,"0")) : 0;

        lyrics.push({
          time: min * 60 + sec + ms,
          text: cleanText
        });
      });
    });

    lyrics.sort((a,b) => a.time - b.time);

    if(!lyrics.length){
      throw new Error("LRC leeg of verkeerd formaat");
    }

    lyricsBox.innerHTML = lyrics.map((l,i) =>
      `<div class="line" id="line-${i}">${escapeHtml(l.text)}</div>`
    ).join("");

    statusText.textContent = lyrics.length + " lyric lines loaded";
  }catch(e){
    statusText.textContent = "ERROR: lyrics.lrc niet gevonden of verkeerd formaat";
    lyricsBox.innerHTML = `<div class="line active">LYRICS NIET GELADEN</div>`;
  }
}

function escapeHtml(str){
  return str.replace(/[&<>"']/g, c => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    '"':"&quot;",
    "'":"&#039;"
  }[c]));
}

async function enterKaraoke(){
  jetSound.currentTime = 0;
  jetSound.volume = 1;
  jetSound.play().catch(()=>{});

  jet.classList.remove("fly");
  void jet.offsetWidth;
  jet.classList.add("fly");

  document.body.classList.add("shake");

  setTimeout(() => {
    document.body.classList.remove("shake");
  }, 550);

  setTimeout(async () => {
    enterScreen.style.display = "none";
    karaokeScreen.style.display = "block";

    bgVideo.currentTime = 0;
    bgVideo.play().catch(()=>{});

    audio.currentTime = 0;
    audio.volume = 1;

    try{
      await audio.play();
      statusText.textContent = "Playing — Tiger mode";
    }catch(e){
      statusText.textContent = "Audio blocked. Druk op PLAY.";
    }

    updateLyrics(true);
  }, 1550);
}

function playSong(){
  audio.play().then(() => {
    statusText.textContent = "Playing";
  }).catch(() => {
    statusText.textContent = "Audio speelt niet. Check bestandsnaam: Araxos Baby.mp3";
  });

  bgVideo.play().catch(()=>{});
}

function pauseSong(){
  audio.pause();
  bgVideo.pause();
  statusText.textContent = "Paused";
}

function stopSong(){
  audio.pause();
  audio.currentTime = 0;

  bgVideo.pause();
  bgVideo.currentTime = 0;

  lastActiveIndex = -1;
  updateLyrics(true);
  statusText.textContent = "Stopped";
}

function toggleRepeat(){
  repeat = !repeat;
  audio.loop = repeat;

  repeatBtn.textContent = repeat ? "REPEAT ON" : "REPEAT OFF";
  repeatBtn.classList.toggle("active", repeat);
}

function updateLyrics(force=false){
  if(!lyrics.length) return;

  const t = audio.currentTime;
  let activeIndex = 0;

  for(let i = 0; i < lyrics.length; i++){
    if(t >= lyrics[i].time) activeIndex = i;
    else break;
  }

  if(activeIndex === lastActiveIndex && !force) return;
  lastActiveIndex = activeIndex;

  document.querySelectorAll(".line").forEach((el,i) => {
    el.classList.toggle("active", i === activeIndex);
  });

  const activeLine = document.getElementById("line-" + activeIndex);
  if(activeLine){
    activeLine.scrollIntoView({
      behavior:"smooth",
      block:"center"
    });
  }

  statusText.textContent =
    formatTime(audio.currentTime) + " / " + formatTime(audio.duration || 0);
}

function formatTime(seconds){
  if(!isFinite(seconds)) return "0:00";
  const m = Math.floor(seconds / 60);
  const s = Math.floor(seconds % 60).toString().padStart(2,"0");
  return `${m}:${s}`;
}

audio.addEventListener("timeupdate", updateLyrics);

audio.addEventListener("error", () => {
  statusText.textContent = "ERROR: muziekbestand niet gevonden. Check exact: Araxos Baby.mp3";
});

bgVideo.addEventListener("error", () => {
  statusText.textContent = "ERROR: simone.mp4 niet gevonden";
});

jetSound.addEventListener("error", () => {
  statusText.textContent = "ERROR: jet.mp3 niet gevonden";
});

audio.addEventListener("ended", () => {
  if(!repeat){
    statusText.textContent = "Finished — Tiger mode complete";
  }
});

loadLRC();
</script>

</body>
</html>
