<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tiger Soundboard</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  min-height:100vh;
  color:white;
  font-family:Arial,Helvetica,sans-serif;
  background:
    radial-gradient(circle at 20% 0%,rgba(255,140,0,.35),transparent 30%),
    radial-gradient(circle at 80% 10%,rgba(255,80,0,.16),transparent 28%),
    linear-gradient(160deg,#030303,#101010 45%,#050505);
  padding:22px;
}
body::before{
  content:"";
  position:fixed;inset:0;
  pointer-events:none;
  background:repeating-linear-gradient(135deg,rgba(255,140,0,.025) 0 2px,transparent 2px 10px);
}
.header{
  display:flex;justify-content:space-between;align-items:center;gap:18px;flex-wrap:wrap;margin-bottom:22px;
}
.brand{display:flex;align-items:center;gap:14px}
.logo{
  width:66px;height:66px;border-radius:20px;
  display:grid;place-items:center;font-size:36px;
  background:linear-gradient(145deg,#ffb000,#ff6200);
  box-shadow:0 0 35px rgba(255,128,0,.35), inset 0 0 18px rgba(255,255,255,.25);
}
h1{font-size:28px;letter-spacing:2px}
.subtitle{font-size:13px;color:#aaa;margin-top:5px}
.panel{
  background:rgba(15,15,15,.72);
  border:1px solid rgba(255,140,0,.22);
  border-radius:22px;
  padding:14px;
  backdrop-filter:blur(14px);
  box-shadow:0 0 35px rgba(0,0,0,.35);
}
.controls{
  display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:22px;
}
.btn{
  border:1px solid rgba(255,140,0,.35);
  background:linear-gradient(145deg,#171717,#0d0d0d);
  color:white;
  padding:12px 16px;
  border-radius:14px;
  cursor:pointer;
  font-weight:800;
  transition:.18s;
}
.btn:hover{background:#ff8800;color:black;transform:translateY(-2px)}
.sliderBox{display:flex;align-items:center;gap:8px;color:#bbb;font-size:12px}
input[type=range]{accent-color:#ff8800}
.sectionTitle{
  margin:18px 0 12px;
  color:#ffb347;
  font-size:14px;
  letter-spacing:1.5px;
  text-transform:uppercase;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(210px,1fr));
  gap:15px;
}
.card{
  position:relative;overflow:hidden;
  min-height:145px;
  border-radius:22px;
  padding:18px;
  cursor:pointer;
  background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.025));
  border:1px solid rgba(255,140,0,.18);
  box-shadow:0 10px 28px rgba(0,0,0,.28);
  transition:.18s;
}
.card:hover{
  transform:translateY(-4px) scale(1.015);
  border-color:rgba(255,140,0,.8);
  box-shadow:0 0 30px rgba(255,120,0,.22);
}
.card:active{transform:scale(.96)}
.card.flash{
  animation:flash .45s ease;
}
@keyframes flash{
  0%{box-shadow:0 0 0 rgba(255,140,0,0)}
  40%{box-shadow:0 0 45px rgba(255,140,0,.75);border-color:#ffb000}
  100%{box-shadow:0 10px 28px rgba(0,0,0,.28)}
}
.emoji{font-size:30px;margin-bottom:14px}
.name{font-size:18px;font-weight:900;margin-bottom:8px}
.meta{font-size:12px;color:#999}
.playTag{
  position:absolute;right:14px;bottom:14px;
  color:#ff9d00;font-size:12px;font-weight:900;
}
.bgCard.active{
  border-color:#ffb000;
  background:linear-gradient(180deg,rgba(255,150,0,.22),rgba(255,255,255,.035));
  box-shadow:0 0 32px rgba(255,140,0,.32);
}
.bgCard.active::after{
  content:"PLAYING";
  position:absolute;top:14px;right:14px;
  color:black;background:#ffb000;
  padding:5px 9px;border-radius:999px;
  font-size:10px;font-weight:900;
}
.now{
  position:fixed;left:50%;bottom:18px;transform:translateX(-50%);
  width:min(720px,calc(100% - 28px));
  display:flex;justify-content:space-between;align-items:center;gap:10px;
  background:rgba(10,10,10,.92);
  border:1px solid rgba(255,140,0,.35);
  border-radius:18px;
  padding:12px 16px;
  box-shadow:0 0 28px rgba(255,120,0,.16);
  z-index:5;
}
.equalizer{display:flex;gap:4px;height:22px;align-items:end}
.equalizer span{
  width:4px;background:#ff8800;border-radius:4px;
  animation:eq .7s infinite ease-in-out;
}
.equalizer span:nth-child(2){animation-delay:.12s}
.equalizer span:nth-child(3){animation-delay:.24s}
.equalizer span:nth-child(4){animation-delay:.36s}
@keyframes eq{0%,100%{height:5px}50%{height:22px}}
.footer{
  text-align:center;color:#777;font-size:11px;margin:32px 0 70px;
}
@media(max-width:650px){
  body{padding:14px}
  h1{font-size:22px}
  .grid{grid-template-columns:1fr 1fr;gap:10px}
  .card{min-height:132px;padding:14px}
  .name{font-size:14px}
}
</style>
</head>

<body>

<header class="header">
  <div class="brand">
    <div class="logo">🐯</div>
    <div>
      <h1>TIGER SOUNDBOARD</h1>
      <div class="subtitle">Araxos Premium Audio Control Panel</div>
    </div>
  </div>
</header>

<div class="panel controls">
  <button class="btn" onclick="stopEffect()">STOP SOUND</button>
  <button class="btn" onclick="stopBackground()">STOP BACKGROUND</button>

  <div class="sliderBox">SOUNDS <input id="effectVol" type="range" min="0" max="1" step=".01" value="1"></div>
  <div class="sliderBox">BACKGROUND <input id="bgVol" type="range" min="0" max="1" step=".01" value=".45"></div>
</div>

<div class="sectionTitle">Background Tracks</div>
<div class="grid" id="backgroundGrid"></div>

<div class="sectionTitle">Main Soundboard</div>
<div class="grid" id="soundGrid"></div>

<div class="footer">Made by Jo Chen · V1.1</div>

<div class="now">
  <div id="nowText">Ready for deployment...</div>
  <div class="equalizer" id="eq" style="display:none">
    <span></span><span></span><span></span><span></span>
  </div>
</div>

<script>
const soundPath = "sounds/";

const backgrounds = [
  {name:"Background 1", file:"Back 1.mp3", emoji:"🎼"},
  {name:"Background 2", file:"Back 2.mp3", emoji:"🎧"},
  {name:"Background 3", file:"Back 3.mp3", emoji:"🌌"},
  {name:"Background 4", file:"Back 4.mp3", emoji:"🔥"}
];

const sounds = [
  {name:"31 Tigers", file:"31 Tigers.mp3", emoji:"🐯"},
  {name:"31best", file:"31best.mp3", emoji:"🔥"},
  {name:"Afuckraxos", file:"Afuckraxos.mp3", emoji:"💀"},
  {name:"Araxos Baby", file:"Araxos Baby.mp3", emoji:"✈️"},
  {name:"Beer is cold", file:"Beer is cold.mp3", emoji:"🍺"},
  {name:"Belgium Power", file:"Belgium Power.mp3", emoji:"🇧🇪"},
  {name:"CarefulGunny", file:"CarefulGunny.mp3", emoji:"⚠️"},
  {name:"Fucking Go Gunny", file:"Fucking Go Gunny.mp3", emoji:"🚀"},
  {name:"Go31", file:"Go31.mp3", emoji:"🎖️"},
  {name:"Gunny flying high", file:"Gunny flying high.mp3", emoji:"🛩️"},
  {name:"Gunny Gunny", file:"Gunny Gunny.mp3", emoji:"📡"},
  {name:"Gunny", file:"Gunny.mp3", emoji:"🎤"},
  {name:"Hands up", file:"Hands up.mp3", emoji:"🙌"},
  {name:"Harderfastergunny", file:"Harderfastergunny.mp3", emoji:"⚡"},
  {name:"MaleAraxos", file:"MaleAraxos.mp3", emoji:"🗿"},
  {name:"Number one", file:"Number one.mp3", emoji:"🏆"},
  {name:"oohgunny", file:"oohgunny.mp3", emoji:"😩"},
  {name:"Roaring Tiger", file:"Roaring Tiger.mp3", emoji:"🐅"}
];

const soundGrid = document.getElementById("soundGrid");
const backgroundGrid = document.getElementById("backgroundGrid");
const nowText = document.getElementById("nowText");
const eq = document.getElementById("eq");
const effectVol = document.getElementById("effectVol");
const bgVol = document.getElementById("bgVol");

let currentEffect = null;
let currentBackground = null;
let activeBgCard = null;

function makeCard(item, isBg=false){
  const card = document.createElement("div");
  card.className = isBg ? "card bgCard" : "card";
  card.innerHTML = `
    <div class="emoji">${item.emoji}</div>
    <div class="name">${item.name}</div>
    <div class="meta">${isBg ? "Looping background track" : "One-shot premium sound"}</div>
    <div class="playTag">PLAY</div>
  `;
  card.onclick = () => isBg ? playBackground(item, card) : playEffect(item, card);
  return card;
}

sounds.forEach(s => soundGrid.appendChild(makeCard(s)));
backgrounds.forEach(b => backgroundGrid.appendChild(makeCard(b, true)));

function playEffect(sound, card){
  card.classList.remove("flash");
  void card.offsetWidth;
  card.classList.add("flash");

  if(currentEffect){
    currentEffect.pause();
    currentEffect.currentTime = 0;
  }

  currentEffect = new Audio(soundPath + encodeURIComponent(sound.file).replaceAll("%2F","/"));
  currentEffect.volume = effectVol.value;
  currentEffect.play().catch(() => alert("Kan sound niet afspelen: " + sound.file));

  nowText.textContent = "▶ " + sound.name;
  eq.style.display = "flex";

  currentEffect.onended = () => {
    if(!currentBackground) eq.style.display = "none";
  };
}

function playBackground(bg, card){
  if(currentBackground){
    currentBackground.pause();
    currentBackground.currentTime = 0;
  }

  if(activeBgCard) activeBgCard.classList.remove("active");

  currentBackground = new Audio(soundPath + encodeURIComponent(bg.file).replaceAll("%2F","/"));
  currentBackground.loop = true;
  currentBackground.volume = bgVol.value;
  currentBackground.play().catch(() => alert("Kan background niet afspelen: " + bg.file));

  card.classList.add("active");
  activeBgCard = card;

  nowText.textContent = "♫ Background playing: " + bg.name;
  eq.style.display = "flex";
}

function stopEffect(){
  if(currentEffect){
    currentEffect.pause();
    currentEffect.currentTime = 0;
    currentEffect = null;
  }
  nowText.textContent = currentBackground ? "♫ Background still playing" : "Sound stopped.";
  if(!currentBackground) eq.style.display = "none";
}

function stopBackground(){
  if(currentBackground){
    currentBackground.pause();
    currentBackground.currentTime = 0;
    currentBackground = null;
  }
  if(activeBgCard){
    activeBgCard.classList.remove("active");
    activeBgCard = null;
  }
  nowText.textContent = "Background stopped.";
  if(!currentEffect) eq.style.display = "none";
}

effectVol.addEventListener("input", () => {
  if(currentEffect) currentEffect.volume = effectVol.value;
});

bgVol.addEventListener("input", () => {
  if(currentBackground) currentBackground.volume = bgVol.value;
});
</script>

</body>
</html>
