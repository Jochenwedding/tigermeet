<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tigermeet Araxos</title>

  <style>
    *{margin:0;padding:0;box-sizing:border-box}

    body{
      min-height:100vh;
      overflow-x:hidden;
      font-family:Arial, Helvetica, sans-serif;
      color:white;
      background:
        linear-gradient(rgba(0,0,0,.82), rgba(0,0,0,.94)),
        repeating-linear-gradient(45deg,#ff8800 0,#ff8800 20px,#000 20px,#000 40px);
    }

    body.shake{
      animation:shake .45s;
    }

    @keyframes shake{
      0%{transform:translate(0,0)}
      20%{transform:translate(-10px,6px)}
      40%{transform:translate(10px,-6px)}
      60%{transform:translate(-7px,-10px)}
      80%{transform:translate(7px,10px)}
      100%{transform:translate(0,0)}
    }

    .enter-screen{
      position:fixed;
      inset:0;
      z-index:1000;
      display:flex;
      align-items:center;
      justify-content:center;
      background:
        radial-gradient(circle, rgba(255,140,0,.3), rgba(0,0,0,.96) 70%),
        repeating-linear-gradient(45deg,#ff8800 0,#ff8800 20px,#000 20px,#000 40px);
      overflow:hidden;
    }

    .enter-btn{
      border:none;
      cursor:pointer;
      padding:30px 70px;
      border-radius:25px;
      font-size:36px;
      font-weight:900;
      letter-spacing:6px;
      color:black;
      background:linear-gradient(135deg,#ffcc00,#ff6600);
      box-shadow:0 0 45px orange;
      animation:pulseBtn 1s infinite alternate;
      z-index:5;
    }

    @keyframes pulseBtn{
      from{transform:scale(1);box-shadow:0 0 25px orange}
      to{transform:scale(1.08);box-shadow:0 0 75px #ffcc00}
    }

    .hidden{display:none}

    .enter-jet{
      position:fixed;
      top:38%;
      left:-350px;
      width:260px;
      z-index:2000;
      filter:drop-shadow(0 0 25px orange);
      display:none;
    }

    .enter-jet.fly{
      display:block;
      animation:flyby 3.6s ease-in forwards;
    }

    @keyframes flyby{
      0%{left:-350px;top:48%;transform:rotate(8deg) scale(.8)}
      60%{left:55vw;top:30%;transform:rotate(8deg) scale(1.45)}
      100%{left:120vw;top:15%;transform:rotate(8deg) scale(2)}
    }

    .explosion{
      position:fixed;
      inset:0;
      z-index:2500;
      background:radial-gradient(circle, rgba(255,230,120,1), rgba(255,90,0,.85), transparent 55%);
      opacity:0;
      pointer-events:none;
    }

    .explosion.boom{
      animation:boomFlash .7s forwards;
    }

    @keyframes boomFlash{
      0%{opacity:0;transform:scale(.4)}
      25%{opacity:1;transform:scale(1)}
      100%{opacity:0;transform:scale(2.4)}
    }

    .tiger{
      position:fixed;
      left:-200px;
      font-size:48px;
      z-index:1;
      filter:drop-shadow(0 0 10px orange);
      animation:runTiger 14s linear infinite;
      pointer-events:none;
    }

    .t1{top:8%; animation-delay:0s}
    .t2{top:28%; animation-delay:4s}
    .t3{top:60%; animation-delay:2s}
    .t4{top:82%; animation-delay:7s}

    @keyframes runTiger{
      from{transform:translateX(-250px)}
      to{transform:translateX(calc(100vw + 300px))}
    }

    .topstripe,.bottomstripe{
      position:fixed;
      left:0;
      width:100%;
      height:18px;
      z-index:20;
      background:repeating-linear-gradient(90deg,orange 0,orange 28px,black 28px,black 56px);
    }

    .topstripe{top:0}
    .bottomstripe{bottom:0}

    .corner-photo{
      position:fixed;
      bottom:35px;
      width:120px;
      height:120px;
      object-fit:cover;
      border-radius:24px;
      border:2px solid orange;
      z-index:15;
      box-shadow:0 0 25px rgba(255,140,0,.85);
    }

    .left-photo{left:25px}
    .right-photo{right:25px}

    main{
      position:relative;
      z-index:5;
      width:min(1100px,94%);
      margin:0 auto;
      padding:60px 0 150px;
      text-align:center;
    }

    .card{
      background:rgba(0,0,0,.72);
      border:2px solid rgba(255,150,0,.72);
      border-radius:35px;
      padding:35px;
      box-shadow:0 0 35px rgba(255,140,0,.5), inset 0 0 25px rgba(255,140,0,.15);
      backdrop-filter:blur(10px);
    }

    .banner{
      width:100%;
      max-height:520px;
      object-fit:contain;
      background:black;
      border-radius:28px;
      border:2px solid orange;
      box-shadow:0 0 35px rgba(255,140,0,.75);
      margin-bottom:30px;
    }

    .badge{
      display:inline-block;
      padding:11px 24px;
      margin-bottom:20px;
      border-radius:999px;
      background:linear-gradient(90deg,#ffcc00,#ff6600);
      color:black;
      font-weight:900;
      letter-spacing:4px;
      box-shadow:0 0 20px orange;
    }

    h1{
      font-size:clamp(42px,7vw,85px);
      text-transform:uppercase;
      line-height:.95;
      background:linear-gradient(#fff7d1,#ff9900,#cc5500);
      -webkit-background-clip:text;
      color:transparent;
      text-shadow:0 0 25px rgba(255,140,0,.55);
    }

    h2{
      margin:16px 0 28px;
      font-size:clamp(24px,4vw,44px);
      color:#ffd9a1;
      text-shadow:0 0 18px orange;
    }

    .main-photo{
      width:100%;
      max-width:760px;
      max-height:520px;
      object-fit:contain;
      background:black;
      border-radius:28px;
      border:2px solid orange;
      box-shadow:0 0 35px rgba(255,140,0,.75);
      margin:20px auto 20px;
      display:block;
    }

    .submit-btn{
      margin-top:18px;
      border:none;
      cursor:pointer;
      padding:17px 32px;
      border-radius:18px;
      font-size:18px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:2px;
      color:black;
      background:linear-gradient(135deg,#ffcc00,#ff6600);
      box-shadow:0 0 25px rgba(255,140,0,.8);
      transition:.25s;
    }

    .submit-btn:hover{
      transform:translateY(-4px) scale(1.04);
      box-shadow:0 0 45px rgba(255,180,0,1);
    }

    @media(max-width:750px){
      main{padding-bottom:190px}
      .card{padding:24px 18px}
      .corner-photo{width:86px;height:86px;bottom:30px}
      .left-photo{left:12px}
      .right-photo{right:12px}
      .enter-btn{font-size:26px;padding:24px 45px}
      .enter-jet{width:190px}
    }
  </style>
</head>

<body>

  <audio id="bgmusic" loop preload="auto">
    <source src="Araxos%20Baby.mp3" type="audio/mpeg">
  </audio>

  <audio id="jetSound" preload="auto">
    <source src="jet.mp3" type="audio/mpeg">
  </audio>

  <audio id="boomSound" preload="auto">
    <source src="boom.mp3" type="audio/mpeg">
  </audio>

  <section class="enter-screen" id="enterScreen">
    <button class="enter-btn" id="enterBtn" onclick="enterSite()">ENTER</button>
  </section>

  <img class="enter-jet" id="enterJet" src="jet.png" alt="">
  <div class="explosion" id="explosion"></div>

  <div class="topstripe"></div>
  <div class="bottomstripe"></div>

  <div class="tiger t1">🐯</div>
  <div class="tiger t2">🐅</div>
  <div class="tiger t3">🐯</div>
  <div class="tiger t4">🐅</div>

  <img class="corner-photo left-photo" src="1.jpeg" alt="">
  <img class="corner-photo right-photo" src="1.jpeg" alt="">

  <main>
    <section class="card">
      <img class="banner" src="2.jpeg" alt="">

      <div class="badge">TIGERMEET 2026</div>

      <h1>Tigermeet Araxos 2026</h1>


      <div class="video-wrapper">
        <video
          id="simoneVideo"
          class="main-photo"
          autoplay
          muted
          loop
          playsinline
          controls
          onclick="muteMusic()"
        >
          <source src="simone.mp4" type="video/mp4">
        </video>

        <button class="submit-btn" onclick="toggleMusic()">
          🔊 Muziek aan / uit
        </button>
      </div>
    </section>
  </main>

  <script>
    async function enterSite(){
      const enterScreen = document.getElementById("enterScreen");
      const enterBtn = document.getElementById("enterBtn");
      const jet = document.getElementById("enterJet");
      const explosion = document.getElementById("explosion");
      const music = document.getElementById("bgmusic");
      const jetSound = document.getElementById("jetSound");
      const boomSound = document.getElementById("boomSound");

      enterBtn.style.display = "none";

      try{
        jetSound.currentTime = 0;
        jetSound.volume = 1;
        await jetSound.play();
      }catch(e){}

      jet.classList.add("fly");

      setTimeout(() => {
        try{
          boomSound.currentTime = 0;
          boomSound.volume = 1;
          boomSound.play();
        }catch(e){}

        explosion.classList.add("boom");
        document.body.classList.add("shake");

        setTimeout(() => {
          document.body.classList.remove("shake");
        }, 500);
      }, 500);

      setTimeout(async () => {
        enterScreen.classList.add("hidden");
        jet.classList.remove("fly");
        explosion.classList.remove("boom");

        try{
          music.volume = 0.9;
          music.muted = false;
          await music.play();
        }catch(error){
          alert("Muziek kon niet starten. Check of Araxos Baby.mp3 mee geüpload is.");
          console.log(error);
        }
      }, 4200);
    }

    function muteMusic(){
      const music = document.getElementById("bgmusic");
      music.muted = true;
    }

    function toggleMusic(){
      const music = document.getElementById("bgmusic");

      if(music.muted){
        music.muted = false;
        music.volume = 0.9;
        music.play();
      }else{
        music.muted = true;
      }
    }
  </script>
<div id="chatbot" style="position:fixed;bottom:20px;right:20px;width:320px;background:#111;border:1px solid #333;border-radius:12px;padding:10px;color:white;font-family:Arial;z-index:9999;">
  <h3>CIS Support</h3>

  <div id="chatlog" style="height:220px;overflow:auto;background:#1a1a1a;padding:8px;border-radius:8px;margin-bottom:10px;"></div>

  <input id="msg" placeholder="Typ iets..."
    style="width:70%;padding:8px;border-radius:6px;border:none;">

  <button onclick="sendMsg()"
    style="padding:8px;border:none;border-radius:6px;background:#00bfff;color:white;">
    Send
  </button>
</div>

<script>
async function sendMsg() {

  const input = document.getElementById("msg");
  const log = document.getElementById("chatlog");

  const text = input.value.trim();

  if (!text) return;

  log.innerHTML += `<p><b>Gij:</b> ${text}</p>`;

  input.value = "";

  const res = await fetch("/api/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      message: text
    })
  });

  const data = await res.json();

  log.innerHTML += `<p><b>Bot:</b> ${data.reply}</p>`;

  log.scrollTop = log.scrollHeight;
}
</script>
</body>
</html>
