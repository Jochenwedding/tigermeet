<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

<title>TIGERWORD</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  width:100%;
  min-height:100%;
  overflow-x:hidden;
  background:#050505;
  font-family:Arial,Helvetica,sans-serif;
  color:white;
}

body{
  background:
    radial-gradient(circle at top,rgba(255,140,0,.25),transparent 35%),
    linear-gradient(160deg,#050505,#111,#000);
}

.hidden{
  display:none!important;
}

.screen{
  width:100%;
  max-width:520px;
  margin:auto;
  padding:16px;
}

.title{
  text-align:center;
  margin-top:18px;
  margin-bottom:18px;
}

.title h1{
  color:#ff9900;
  font-size:42px;
  letter-spacing:2px;
}

.title p{
  color:#aaa;
  margin-top:6px;
}

.card{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,153,0,.25);
  border-radius:18px;
  padding:16px;
  margin-bottom:14px;
  box-shadow:0 0 25px rgba(255,140,0,.08);
}

input,button,select{
  width:100%;
  border:none;
  outline:none;
  border-radius:14px;
  padding:15px;
  font-size:16px;
}

input,select{
  background:#111;
  color:white;
  border:1px solid #333;
  margin-top:10px;
}

button{
  background:#ff8800;
  color:#111;
  font-weight:bold;
  cursor:pointer;
  margin-top:12px;
}

button:active{
  transform:scale(.98);
}

.status{
  text-align:center;
  color:#ff9900;
  min-height:22px;
  margin-top:12px;
  font-weight:bold;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin-bottom:14px;
}

.timer{
  font-size:34px;
  color:#ff9900;
  font-weight:bold;
}

.rolebadge{
  background:#151515;
  border:1px solid #333;
  border-radius:12px;
  padding:8px 12px;
  color:#ccc;
}

.players{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.player{
  background:#151515;
  border-radius:14px;
  padding:12px;
  border:1px solid #333;
}

.player.you{
  border-color:#ff9900;
}

.player .name{
  font-weight:bold;
}

.player .score{
  margin-top:4px;
  color:#ff9900;
  font-size:13px;
}

.board{
  display:grid;
  gap:8px;
  margin-top:18px;
  justify-content:center;
}

.row{
  display:grid;
  grid-template-columns:repeat(5,58px);
  gap:8px;
}

.tile{
  width:58px;
  height:58px;
  border-radius:10px;
  border:2px solid #333;
  background:#181818;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  font-weight:bold;
  text-transform:uppercase;
}

.correct{
  background:#31c76a!important;
  border-color:#31c76a!important;
}

.present{
  background:#d8b11e!important;
  border-color:#d8b11e!important;
  color:#111;
}

.absent{
  background:#333!important;
  border-color:#333!important;
  color:#777;
}

.keyboard{
  margin-top:18px;
  display:grid;
  gap:6px;
}

.keyrow{
  display:flex;
  justify-content:center;
  gap:5px;
}

.key{
  min-width:32px;
  height:48px;
  border:none;
  border-radius:8px;
  background:#222;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.key.big{
  min-width:60px;
}

.key.correct{
  background:#31c76a!important;
  color:white!important;
}

.key.present{
  background:#d8b11e!important;
  color:#111!important;
}

.key.absent{
  background:#444!important;
  color:#888!important;
}

.leaderBoards{
  display:grid;
  gap:12px;
  margin-top:18px;
}

.miniBoard{
  background:#121212;
  border-radius:14px;
  padding:12px;
  border:1px solid #333;
}

.miniBoard h3{
  margin-bottom:10px;
  color:#ff9900;
}

.miniGuess{
  font-family:monospace;
  margin-top:4px;
}

.small{
  color:#999;
  font-size:13px;
  text-align:center;
  margin-top:10px;
}

.shake{
  animation:shake .2s;
}

@keyframes shake{
  0%{transform:translateX(0)}
  25%{transform:translateX(-5px)}
  50%{transform:translateX(5px)}
  75%{transform:translateX(-3px)}
  100%{transform:translateX(0)}
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menuScreen" class="screen">

  <div class="title">
    <h1>🐯 TIGERWORD</h1>
    <p>Fastest tiger wins.</p>
  </div>

  <div class="card">

    <label>Naam</label>
    <input id="nameInput" value="Jochen" />

    <label style="display:block;margin-top:14px;">Rol</label>

    <select id="roleSelect">
      <option value="player">Player</option>
      <option value="leader">Leader</option>
    </select>

    <div id="leaderFields" class="hidden">
      <input
        id="secretWordInput"
        maxlength="5"
        placeholder="SECRET WORD"
      />
    </div>

    <button onclick="joinGame()">JOIN LOBBY</button>

    <div class="small">
      Prototype local version.<br>
      Online multiplayer komt later via Cloudflare Worker.
    </div>

  </div>

</div>

<!-- GAME -->
<div id="gameScreen" class="screen hidden">

  <div class="topbar">
    <div class="timer" id="timer">45</div>
    <div class="rolebadge" id="roleBadge">PLAYER</div>
  </div>

  <div class="card">
    <div class="players" id="players"></div>
  </div>

  <div class="status" id="status"></div>

  <!-- PLAYER -->
  <div id="playerGame">

    <div class="board" id="board"></div>

    <div class="keyboard" id="keyboard"></div>

  </div>

  <!-- LEADER -->
  <div id="leaderGame" class="hidden">

    <div class="leaderBoards" id="leaderBoards"></div>

  </div>

</div>

<script>
const VALID_WORDS = [
"TIGER","RADAR","ROTOR","FALCO","CABLE","CRYPT","RADIO","ALARM","BASES",
"PLANE","TRACK","WIRES","PANEL","TOWER","POWER","LIGHT","FLARE","MOUSE"
];

let role = "player";
let playerName = "";
let secretWord = "";

let guesses = [];
let currentGuess = "";
let maxGuesses = 6;

let timer = 45;
let timerInterval;

let gameEnded = false;

let keyboardState = {};

const fakePlayers = [
  {name:"Tommy",score:320,guesses:["RADAR","POWER"]},
  {name:"Kevin",score:250,guesses:["LIGHT","TIGER"]},
];

function joinGame(){

  role = document.getElementById("roleSelect").value;

  playerName =
    document.getElementById("nameInput").value.trim() || "Player";

  if(role === "leader"){

    const word =
      document.getElementById("secretWordInput")
      .value
      .trim()
      .toUpperCase();

    if(word.length !== 5){
      return showStatus("Woord moet exact 5 letters zijn.");
    }

    if(!VALID_WORDS.includes(word)){
      return showStatus("Dat woord bestaat niet.");
    }

    secretWord = word;
  }else{
    secretWord =
      VALID_WORDS[Math.floor(Math.random()*VALID_WORDS.length)];
  }

  document.getElementById("menuScreen").classList.add("hidden");
  document.getElementById("gameScreen").classList.remove("hidden");

  document.getElementById("roleBadge").innerText =
    role.toUpperCase();

  if(role === "leader"){
    startLeaderView();
  }else{
    startPlayerView();
  }

  startTimer();
}

document
.getElementById("roleSelect")
.addEventListener("change",(e)=>{

  document
  .getElementById("leaderFields")
  .classList.toggle(
    "hidden",
    e.target.value !== "leader"
  );

});

function startTimer(){

  clearInterval(timerInterval);

  timerInterval = setInterval(()=>{

    timer--;

    document.getElementById("timer").innerText = timer;

    if(timer <= 0){
      clearInterval(timerInterval);

      if(role === "player"){
        endGame("Tijd op! Woord was " + secretWord);
      }else{
        showStatus("Round finished.");
      }
    }

  },1000);

}

function renderPlayers(){

  const div = document.getElementById("players");

  div.innerHTML = `
    <div class="player you">
      <div class="name">${playerName}</div>
      <div class="score">0 punten</div>
    </div>

    <div class="player">
      <div class="name">Tommy</div>
      <div class="score">320 punten</div>
    </div>

    <div class="player">
      <div class="name">Kevin</div>
      <div class="score">250 punten</div>
    </div>

    <div class="player">
      <div class="name">Jorrit</div>
      <div class="score">180 punten</div>
    </div>
  `;
}

function startPlayerView(){

  renderPlayers();

  renderBoard();

  renderKeyboard();

}

function renderBoard(){

  const board = document.getElementById("board");

  board.innerHTML = "";

  for(let r=0;r<maxGuesses;r++){

    const row = document.createElement("div");
    row.className = "row";

    let word =
      guesses[r] ||
      (r === guesses.length ? currentGuess : "");

    for(let c=0;c<5;c++){

      const tile = document.createElement("div");
      tile.className = "tile";

      const letter = word[c] || "";

      tile.innerText = letter;

      if(guesses[r]){

        const state = getLetterState(guesses[r],c);

        tile.classList.add(state);
      }

      row.appendChild(tile);
    }

    board.appendChild(row);
  }

}

function renderKeyboard(){

  const rows = [
    "QWERTYUIOP",
    "ASDFGHJKL",
    "ZXCVBNM"
  ];

  const keyboard = document.getElementById("keyboard");

  keyboard.innerHTML = "";

  rows.forEach((letters,rowIndex)=>{

    const row = document.createElement("div");
    row.className = "keyrow";

    if(rowIndex === 2){

      const enter = createKey("ENTER","big");
      enter.onclick = submitGuess;
      row.appendChild(enter);

    }

    letters.split("").forEach(letter=>{

      const btn = createKey(letter);

      btn.onclick = ()=>pressKey(letter);

      if(keyboardState[letter]){
        btn.classList.add(keyboardState[letter]);
      }

      row.appendChild(btn);

    });

    if(rowIndex === 2){

      const back = createKey("⌫","big");

      back.onclick = backspace;

      row.appendChild(back);

    }

    keyboard.appendChild(row);

  });

}

function createKey(text,extra=""){

  const btn = document.createElement("button");

  btn.className = "key " + extra;

  btn.innerText = text;

  return btn;
}

function pressKey(letter){

  if(gameEnded) return;

  if(currentGuess.length >= 5) return;

  currentGuess += letter;

  renderBoard();

}

function backspace(){

  if(gameEnded) return;

  currentGuess = currentGuess.slice(0,-1);

  renderBoard();

}

function submitGuess(){

  if(gameEnded) return;

  if(currentGuess.length !== 5){

    shakeBoard();

    return showStatus("5 letters nodig.");
  }

  if(!VALID_WORDS.includes(currentGuess)){

    shakeBoard();

    return showStatus("Dat woord bestaat niet.");
  }

  guesses.push(currentGuess);

  updateKeyboard(currentGuess);

  renderBoard();

  renderKeyboard();

  if(currentGuess === secretWord){

    return endGame(
      "RAWR! Gevonden met " + guesses.length + " guesses."
    );
  }

  currentGuess = "";

  if(guesses.length >= maxGuesses){

    endGame("Geen guesses meer. Woord was " + secretWord);
  }

}

function getLetterState(word,index){

  const letter = word[index];

  if(secretWord[index] === letter){
    return "correct";
  }

  if(secretWord.includes(letter)){
    return "present";
  }

  return "absent";
}

function updateKeyboard(word){

  for(let i=0;i<word.length;i++){

    const letter = word[i];

    const state = getLetterState(word,i);

    const current = keyboardState[letter];

    if(current === "correct") continue;

    if(current === "present" && state === "absent") continue;

    keyboardState[letter] = state;
  }

}

function endGame(text){

  gameEnded = true;

  clearInterval(timerInterval);

  showStatus(text);

}

function showStatus(text){

  document.getElementById("status").innerText = text;

}

function shakeBoard(){

  const board = document.getElementById("board");

  board.classList.add("shake");

  setTimeout(()=>{
    board.classList.remove("shake");
  },200);

}

function startLeaderView(){

  renderPlayers();

  document
  .getElementById("playerGame")
  .classList.add("hidden");

  document
  .getElementById("leaderGame")
  .classList.remove("hidden");

  const div = document.getElementById("leaderBoards");

  div.innerHTML = "";

  fakePlayers.forEach(p=>{

    const card = document.createElement("div");

    card.className = "miniBoard";

    card.innerHTML = `
      <h3>${p.name}</h3>
      ${p.guesses.map(g=>
        `<div class="miniGuess">${g}</div>`
      ).join("")}
    `;

    div.appendChild(card);

  });

}

document.addEventListener("keydown",(e)=>{

  if(role !== "player") return;

  const key = e.key.toUpperCase();

  if(key === "ENTER"){
    submitGuess();
  }
  else if(key === "BACKSPACE"){
    backspace();
  }
  else if(/^[A-Z]$/.test(key)){
    pressKey(key);
  }

});
</script>

</body>
</html>
