<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>TIGERWORD</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;min-height:100%;overflow-x:hidden;background:#050505;color:white;font-family:Arial,Helvetica,sans-serif}
body{
background:
radial-gradient(circle at top,rgba(255,140,0,.22),transparent 35%),
linear-gradient(160deg,#050505,#111,#000)
}

.hidden{display:none!important}

.screen{
width:100%;
max-width:520px;
margin:auto;
padding:14px
}

.title{
text-align:center;
margin:18px 0
}

.title h1{
color:#ff9900;
font-size:38px;
letter-spacing:2px
}

.title p{
color:#aaa;
margin-top:5px;
font-size:14px
}

.card{
background:rgba(255,255,255,.055);
border:1px solid rgba(255,153,0,.25);
border-radius:18px;
padding:14px;
margin-bottom:12px;
box-shadow:0 0 22px rgba(255,140,0,.08)
}

input,button,select{
width:100%;
border:none;
outline:none;
border-radius:13px;
padding:14px;
font-size:16px
}

input,select{
background:#111;
color:white;
border:1px solid #333;
margin-top:8px;
text-transform:uppercase
}

button{
background:#ff8800;
color:#111;
font-weight:bold;
cursor:pointer;
margin-top:10px
}

button.secondary{
background:#222;
color:white;
border:1px solid #444
}

button.danger{
background:#772222;
color:white;
border:1px solid #aa4444
}

button:disabled{
opacity:.45;
cursor:not-allowed
}

button:active{
transform:scale(.98)
}

.small{
font-size:12px;
color:#999;
text-align:center;
margin-top:8px;
line-height:1.35
}

.status{
text-align:center;
color:#ff9900;
min-height:22px;
margin:10px 0;
font-weight:bold;
font-size:14px
}

.topbar{
display:flex;
align-items:center;
justify-content:space-between;
gap:10px;
margin-bottom:10px
}

.badge{
background:#151515;
border:1px solid #333;
border-radius:999px;
padding:7px 10px;
color:#ccc;
font-size:12px
}

.quitBtn{
width:auto;
padding:8px 12px;
margin:0;
font-size:12px;
background:#222;
color:#ddd;
border:1px solid #444
}

.players{
display:flex;
flex-wrap:wrap;
gap:6px;
margin-bottom:10px
}

.playerPill{
background:#141414;
border:1px solid #333;
border-radius:999px;
padding:6px 9px;
font-size:11px;
color:#ccc
}

.playerPill.you{
border-color:#ff9900;
color:white
}

.playerPill.leader{
color:#ff9900
}

.lobbyCard{
border-color:rgba(255,153,0,.45)
}

.lobbyTop{
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
margin-bottom:10px
}

.lobbyTitle{
color:#ff9900;
font-weight:bold;
font-size:18px
}

.lobbyMeta{
font-size:12px;
color:#aaa
}

.lobbyPlayers{
display:flex;
flex-wrap:wrap;
gap:6px;
margin-top:10px
}

.emptyLobby{
color:#777;
font-size:13px;
text-align:center;
padding:10px
}

.phaseBox{
text-align:center;
background:#101010;
border:1px solid #333;
border-radius:16px;
padding:14px;
margin-bottom:12px
}

.phaseBig{
font-size:38px;
color:#ff9900;
font-weight:bold
}

.phaseSmall{
font-size:13px;
color:#aaa;
margin-top:5px
}

.board{
display:grid;
gap:7px;
margin:14px auto 12px;
justify-content:center
}

.row{
display:grid;
grid-template-columns:repeat(5,54px);
gap:7px
}

.tile{
width:54px;
height:54px;
border-radius:8px;
border:2px solid #333;
background:#171717;
display:flex;
align-items:center;
justify-content:center;
font-size:27px;
font-weight:bold;
text-transform:uppercase
}

.tile.filled{
border-color:#555
}

.correct{
background:#31c76a!important;
border-color:#31c76a!important;
color:white!important
}

.present{
background:#d8b11e!important;
border-color:#d8b11e!important;
color:#111!important
}

.absent{
background:#333!important;
border-color:#333!important;
color:#777!important
}

.keyboard{
display:grid;
gap:6px;
margin-top:12px
}

.keyrow{
display:flex;
justify-content:center;
gap:5px
}

.key{
min-width:31px;
height:46px;
border:none;
border-radius:8px;
background:#222;
color:white;
font-weight:bold;
font-size:13px;
margin:0;
padding:0
}

.key.big{
min-width:58px;
font-size:11px
}

.key.absent{
background:#333!important;
color:#777!important
}

.key.present{
background:#d8b11e!important;
color:#111!important
}

.key.correct{
background:#31c76a!important;
color:white!important
}

.leaderGrid{
display:grid;
gap:12px
}

.spectatorCard{
background:#111;
border:1px solid #333;
border-radius:16px;
padding:12px
}

.spectatorTop{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:8px
}

.spectatorTop h3{
font-size:15px;
color:#ff9900
}

.currentTyping{
font-family:monospace;
color:#aaa;
font-size:13px
}

.miniRows{
display:grid;
gap:5px
}

.miniRow{
display:grid;
grid-template-columns:repeat(5,34px);
gap:5px
}

.miniTile{
width:34px;
height:34px;
border-radius:6px;
border:1px solid #333;
background:#181818;
display:flex;
align-items:center;
justify-content:center;
font-size:17px;
font-weight:bold
}

.scoreList{
display:grid;
gap:8px
}

.scoreItem{
display:flex;
justify-content:space-between;
align-items:center;
background:#111;
border:1px solid #333;
border-radius:12px;
padding:10px;
font-size:14px
}

.highscoreItem{
display:grid;
grid-template-columns:34px 1fr auto;
gap:8px;
align-items:center;
background:#111;
border:1px solid #333;
border-radius:12px;
padding:10px;
font-size:14px
}

.rank{
color:#ff9900;
font-weight:bold
}

.hsName{
font-weight:bold
}

.hsMeta{
font-size:12px;
color:#aaa;
text-align:right
}

.shake{
animation:shake .22s
}

@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-5px)}
50%{transform:translateX(5px)}
75%{transform:translateX(-3px)}
100%{transform:translateX(0)}
}

@media(max-width:390px){
.screen{padding:10px}
.row{grid-template-columns:repeat(5,49px);gap:6px}
.tile{width:49px;height:49px;font-size:24px}
.key{min-width:28px;height:43px;font-size:12px}
.key.big{min-width:52px;font-size:10px}
}
</style>
</head>

<body>

<div id="menuScreen" class="screen">

<div class="title">
<h1>🐯 TIGERWORD</h1>
<p>Leader kiest woord · players racen</p>
</div>

<div class="card lobbyCard">

<div class="lobbyTop">
<div>
<div class="lobbyTitle" id="lobbyTitle">LOADING...</div>
<div class="lobbyMeta" id="lobbyMeta">Connecting...</div>
</div>

<div class="badge" id="lobbyPhase">WAITING</div>
</div>

<div class="lobbyPlayers" id="lobbyPlayers">
<div class="emptyLobby">Loading lobby...</div>
</div>

<button id="mainLobbyBtn">
LOADING...
</button>

</div>

<div class="card" id="joinCard">

<label>Naam</label>
<input id="nameInput" value="JOCHEN" maxlength="18" />

<label style="display:block;margin-top:12px;">Rol</label>

<select id="roleSelect">
<option value="player">PLAYER</option>
<option value="leader">LEADER</option>
</select>

<button id="joinBtn" onclick="joinLobby()">
JOIN LOBBY
</button>

<button class="secondary" onclick="showHighscores()">
HIGHSCORES
</button>

<div class="status" id="menuStatus">
Connecting...
</div>

<div class="small">
Max 4 totaal. Leader kiest een bestaand Engels 5-letter woord.
</div>

</div>

<div class="card hidden" id="highscoreCard">

<h3 style="color:#ff9900;margin-bottom:10px;">
🏆 Highscores
</h3>

<div class="scoreList" id="highscoreList">
<div class="small">Nog geen highscores.</div>
</div>

<button class="secondary" onclick="hideHighscores()">
TERUG
</button>

</div>
</div>

<div id="gameScreen" class="screen hidden">

<div class="topbar">

<div class="badge" id="roleBadge">
PLAYER
</div>

<div class="badge" id="phaseBadge">
WAITING
</div>

<button class="quitBtn" onclick="quitGame()">
QUIT
</button>

</div>

<div class="players" id="players"></div>

<div class="phaseBox">

<div class="phaseBig" id="phaseBig">
WAIT
</div>

<div class="phaseSmall" id="phaseSmall">
Wachten op lobby...
</div>

</div>

<div class="status" id="status"></div>

<div id="leaderPanel" class="hidden">

<div class="card">

<label>Secret word</label>

<input id="secretInput" maxlength="5" placeholder="APPLE" />

<button onclick="setSecret()">
SET WORD
</button>

<button onclick="startGame()">
START GAME
</button>

<button class="secondary" onclick="newRound()">
NEW ROUND
</button>

<div class="small">
Leader controls the round.
</div>

</div>

<div class="leaderGrid" id="leaderGrid"></div>

</div>

<div id="playerPanel">

<div class="board" id="board"></div>

<div class="keyboard" id="keyboard"></div>

</div>

<div id="scorePanel" class="card hidden">

<h3 style="color:#ff9900;margin-bottom:10px;">
Score overzicht
</h3>

<div class="scoreList" id="scoreList"></div>

<button class="secondary" onclick="returnToWaiting()">
WACHT OP VOLGENDE RONDE
</button>

</div>

</div>

<script>
/* COMPLETE SCRIPT VAN VORIGE MESSAGE HIER PLAKKEN */
</script>

</body>
</html>
